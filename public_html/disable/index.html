  function rhinoAddPointMarkerAt(v, group) {
    const s = 0.02;
    const o = v;
    const x = o.x;
    const y = o.y;
    const z = o.z;
    const mk = (a, b) => {
      const g = new THREE.BufferGeometry().setFromPoints([a, b]);
      group.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xd3d3d3 })));
    };
    mk(new THREE.Vector3(x - s, y, z), new THREE.Vector3(x + s, y, z));
    mk(new THREE.Vector3(x, y - s, z), new THREE.Vector3(x, y + s, z));
    mk(new THREE.Vector3(x, y, z - s), new THREE.Vector3(x, y, z + s));
  }

  /** PointCloud: prefer official Three JSON (handles colors/normals); else sample getPoints(). */
  function rhinoAddPointCloudToGroup(rhino, pc, matrix4, group) {
    if (!pc) return;
    if (rhino && rhino.PointCloud && pc instanceof rhino.PointCloud && typeof pc.toThreejsJSON === 'function') {
      try {
        const tj = pc.toThreejsJSON();
        const geom = bufferGeometryFromThreeJson(tj);
        if (matrix4 && geom.applyMatrix4) geom.applyMatrix4(matrix4);
        const mat = new THREE.PointsMaterial({ color: 0xa8b4c4, size: 0.12, sizeAttenuation: true });
        group.add(new THREE.Points(geom, mat));
        return;
      } catch (_) {}
    }
    if (typeof pc.getPoints !== 'function') return;
    try {
      const pts = pc.getPoints();
      if (!pts) return;
      const n = typeof pts.length === 'number' ? pts.length : pts.count != null ? pts.count : 0;
      if (!n) return;
      const flat = [];
      for (let i = 0; i < n; i++) {
        let p = pts[i];
        if (p == null && typeof pts.get === 'function') p = pts.get(i);
        if (!p) continue;
        let x;
        let y;
        let z;
        if (Array.isArray(p) && typeof p[0] === 'number') {
          x = Number(p[0]) || 0;
          y = Number(p[1]) || 0;
          z = Number(p[2]) || 0;
        } else if (typeof p.length === 'number' && p[0] !== undefined && !p.x) {
          x = Number(p[0]) || 0;
          y = Number(p[1]) || 0;
          z = Number(p[2]) || 0;
        } else {
          x = Number(p.x) || 0;
          y = Number(p.y) || 0;
          z = Number(p.z) || 0;
        }
        const v = new THREE.Vector3(x, y, z);
        if (matrix4) v.applyMatrix4(matrix4);
        flat.push(v.x, v.y, v.z);
      }
      if (flat.length < 3) return;
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(flat), 3));
      const mat = new THREE.PointsMaterial({ color: 0xa8b4c4, size: 0.12, sizeAttenuation: true });
      group.add(new THREE.Points(g, mat));
    } catch (_) {}
  }

  function rhinoIsRhinoPointCloud(rhino, geo) {
    if (!geo) return false;
    if (rhino && rhino.PointCloud && geo instanceof rhino.PointCloud) return true;
    if (typeof geo.getPoints === 'function' && typeof geo.count === 'number' && geo.count > 0) {
      if (rhino && rhino.Mesh && geo instanceof rhino.Mesh) return false;
      return true;
    }
    return false;
  }

  function rhinoAddSinglePointGeometry(geo, matrix4, group) {
    if (!geo || !geo.location || geo.location.length < 3) return;
    const v = new THREE.Vector3(geo.location[0], geo.location[1], geo.location[2]);
    if (matrix4) v.applyMatrix4(matrix4);
    rhinoAddPointMarkerAt(v, group);
  }

  function rhinoAddTextDotGeometry(geo, matrix4, group) {
    if (!geo || !geo.point || geo.point.length < 3) return;
    const v = new THREE.Vector3(geo.point[0], geo.point[1], geo.point[2]);
    if (matrix4) v.applyMatrix4(matrix4);
    rhinoAddPointMarkerAt(v, group);
  }

  async function parse3dm(buffer) {
    const mod = await import(RHINO3DM_CDN + '/rhino3dm.module.min.js');
    const init = mod.default || mod;
    const wasmBase = getCadWasmBaseUrl();
    const rhino = await init({
      locateFile: (path) => {
        const p = String(path).replace(/^\//, '');
        if (p.endsWith('.wasm')) return wasmBase + p;
        return RHINO3DM_CDN + '/' + p;
      }
    });
    const arr = buffer instanceof ArrayBuffer ? new Uint8Array(buffer) : buffer;
    let doc = rhino.File3dm.fromByteArray(arr);
    if (!doc) throw new Error('Invalid or empty 3DM file');
    let ot = doc.objects();
    if ((!ot || !ot.count) && arr.length > 64 && typeof rhino.File3dm.decode === 'function') {
      try {
        let bin = '';
        const step = 8192;
        for (let i = 0; i < arr.length; i += step) {
          const end = Math.min(i + step, arr.length);
          for (let j = i; j < end; j++) bin += String.fromCharCode(arr[j]);
        }
        const alt = rhino.File3dm.decode(bin);
        if (alt && alt.objects && alt.objects().count > 0) {
          doc = alt;
          ot = doc.objects();
        }
      } catch (_) {}
    }
    if (!ot || typeof ot.count !== 'number') throw new Error('Invalid or empty 3DM file');
    const group = new THREE.Group();
    let meshCount = 0;
    let rhinoMeshPushCount = 0;
    const OT = rhino.ObjectType;
    const MT = rhino.MeshType;

    function addMeshesFromGeometry(geo, matrix4, depth, idefStack) {
      if (!geo || depth > 64) return;
      if (rhinoGeomMatches(geo, OT, 'InstanceReference') || geo.objectType === 10) {
        const ir = geo;
        const idefId = rhinoExtractInstanceIdefId(ir);
        const idef = rhinoFindInstanceDefinition(doc, idefId);
        if (!idef) return;
        const stackKey = rhinoNormalizeId(idefId) || String(idefId || '');
        if (idefStack.indexOf(stackKey) >= 0) return;
        const ids = rhinoNormalizeIdefObjectIds(idef.getObjectIds());
        const m4 = rhinoTransformToMatrix4(ir.xform);
        const combined = matrix4 ? new THREE.Matrix4().multiplyMatrices(matrix4, m4) : m4;
        const nextStack = idefStack.concat([stackKey]);
        for (const oid of ids) {
          const fo = rhinoFindFile3dmObjectById(doc, oid);
          if (!fo) continue;
          const g2 = fo.geometry();
          if (!g2) continue;
          addMeshesFromGeometry(g2, combined, depth + 1, nextStack);
        }
        return;
      }
      const rhMeshes = [];
      rhinoMeshPushCount += pushRhinoMeshesFromGeometry(geo, rhino, OT, MT, rhMeshes);
      for (const rm of rhMeshes) {
        try {
          const mesh = rhinoMeshToThreeMesh(rm);
          if (!mesh) continue;
          if (matrix4) mesh.applyMatrix4(matrix4);
          group.add(mesh);
          meshCount++;
        } catch (_) {}
      }
      if (rhMeshes.length === 0 && rhinoGeomMatches(geo, OT, 'Brep')) {
        rhinoAddBrepWireframe(geo, matrix4, group);
      }
      if (rhMeshes.length === 0 && (rhinoGeomMatches(geo, OT, 'Curve') || geo.objectType === 3)) {
        rhinoAddCurveWireframe(geo, matrix4, group);
      }
      if (rhMeshes.length === 0 && rhinoGeomMatches(geo, OT, 'Extrusion')) {
        rhinoAddExtrusionWireframe(geo, matrix4, group);
      }
      if (rhMeshes.length === 0 && rhinoIsRhinoPointCloud(rhino, geo)) {
        rhinoAddPointCloudToGroup(rhino, geo, matrix4, group);
      }
      if (rhMeshes.length === 0 && (rhinoGeomMatches(geo, OT, 'Point') || geo.objectType === 1)) {
        rhinoAddSinglePointGeometry(geo, matrix4, group);
      }
      if (rhMeshes.length === 0 && (rhinoGeomMatches(geo, OT, 'TextDot') || geo.objectType === 11)) {
        rhinoAddTextDotGeometry(geo, matrix4, group);
      }
    }

    for (let i = 0; i < ot.count; i++) {
      const obj = ot.get(i);
      const geo = obj.geometry();
      if (!geo) continue;
      addMeshesFromGeometry(geo, null, 0, []);
    }
    if (group.children.length === 0) {
      for (let i = 0; i < ot.count; i++) {
        const geo = ot.get(i).geometry();
        if (!geo) continue;
        if (rhinoGeomMatches(geo, OT, 'Curve') || geo.objectType === 3) rhinoAddCurveWireframe(geo, null, group);
        else if (rhinoGeomMatches(geo, OT, 'Brep')) rhinoAddBrepWireframe(geo, null, group);
        else if (rhinoGeomMatches(geo, OT, 'Extrusion')) rhinoAddExtrusionWireframe(geo, null, group);
        else if (rhinoIsRhinoPointCloud(rhino, geo)) rhinoAddPointCloudToGroup(rhino, geo, null, group);
        else if (rhinoGeomMatches(geo, OT, 'Point') || geo.objectType === 1) rhinoAddSinglePointGeometry(geo, null, group);
        else if (rhinoGeomMatches(geo, OT, 'TextDot') || geo.objectType === 11) rhinoAddTextDotGeometry(geo, null, group);
      }
    }
    if (group.children.length === 0) {
      const idefs = doc.instanceDefinitions();
      if (idefs && idefs.count) {
        for (let ii = 0; ii < idefs.count; ii++) {
          const def = idefs.get(ii);
          if (!def || typeof def.getObjectIds !== 'function') continue;
          const ids = rhinoNormalizeIdefObjectIds(def.getObjectIds());
          for (const oid of ids) {
            const fo = rhinoFindFile3dmObjectById(doc, oid);
            if (!fo) continue;
            const g2 = fo.geometry();
            if (!g2) continue;
            addMeshesFromGeometry(g2, null, 0, []);
          }
        }
      }
    }
    if (meshCount === 0 && group.children.length === 0) {
      const err = new Error(
        '3DM file contains no render meshes. Please re-save in Rhino with \'Save Render Meshes\' enabled, or upload as a STEP (.stp) file.'
      );
      err.code = 'NO_MESHES_IN_3DM';
      throw err;
    }
    return { success: true, threeRoot: group, meshCount, rhinoMeshPushCount };
  }

  const DWG_INSERT_MAX_DEPTH = 48;

  function dwgVec3(p) {
    return new THREE.Vector3(Number(p.x) || 0, Number(p.y) || 0, Number(p.z) || 0);
  }

  function dwgPt(p, matrix) {
    const v = new THREE.Vector3(Number(p?.x) || 0, Number(p?.y) || 0, Number(p?.z) || 0);
    if (matrix) v.applyMatrix4(matrix);
    return v;
  }

  function dwgBuildBlockMap(db) {
    const map = new Map();
    const br = db.tables && db.tables.BLOCK_RECORD;
    if (br && br.entries) {
      for (const e of br.entries) {
        if (e && e.name) map.set(e.name, e);
      }
    }
    return map;
  }

  function dwgFindBlock(map, name) {
    if (!name || !map) return null;
    if (map.has(name)) return map.get(name);
    const up = String(name).toUpperCase();
    for (const [k, v] of map) {
      if (String(k).toUpperCase() === up) return v;
    }
    return null;
  }

  /** WASM / Emscripten may expose entity lists as array-like objects, not true Arrays. */
  function dwgToArray(x) {
    if (!x) return [];
    if (Array.isArray(x)) return x;
    if (typeof x.length === 'number') {
      const out = [];
      for (let i = 0; i < x.length; i++) out.push(x[i]);
      return out;
    }
    return [];
  }

  /** True if any entity list exists on the converted database (model space or block records). */
  function dwgDatabaseHasAnyEntities(db) {
    if (!db) return false;
    if (dwgToArray(db.entities).length) return true;
    const br = db.tables && db.tables.BLOCK_RECORD;
    if (!br || !br.entries) return false;
    for (const block of br.entries) {
      if (block && dwgToArray(block.entities).length) return true;
    }
    return false;
  }

  /** libredwg-web fills db.entities from *Model_Space / paper blocks; some builds leave it empty. */
  function dwgGetPrimaryEntities(db) {
    const fromDb = dwgToArray(db.entities);
    if (fromDb.length) return fromDb;
    const br = db.tables && db.tables.BLOCK_RECORD;
    if (!br || !br.entries) return [];
    for (const block of br.entries) {
      if (!block || !block.name) continue;
      const n = String(block.name).toUpperCase();
      if (n.startsWith('*PAPER')) continue;
      if (n === '*MODEL_SPACE' || (n.startsWith('*') && n.includes('MODEL') && n.includes('SPACE'))) {
        const ents = dwgToArray(block.entities);
        if (ents.length) return ents;
      }
    }
    return [];
  }

  /** When model space has no entity list, merge every block definition's entities (helps some exports). */
  function dwgMergeEntitiesFromAllBlockDefinitions(db) {
    const out = [];
    const br = db.tables && db.tables.BLOCK_RECORD;
    if (!br || !br.entries) return out;
    for (const block of br.entries) {
      if (!block || !block.name) continue;
      const n = String(block.name).toUpperCase();
      if (n.startsWith('*PAPER')) continue;
      for (const e of dwgToArray(block.entities)) out.push(e);
    }
    return out;
  }

  /** Last resort: geometry stored only in named block definitions (libredwg model-space iteration quirks). */
  function dwgCollectNamedBlockEntities(db) {
    const out = [];
    const br = db.tables && db.tables.BLOCK_RECORD;
    if (!br || !br.entries) return out;
    for (const block of br.entries) {
      if (!block || !block.name) continue;
      const ents = dwgToArray(block.entities);
      if (!ents.length) continue;
      const n = String(block.name).toUpperCase();
      if (n.startsWith('*PAPER')) continue;
      if (n === '*MODEL_SPACE' || (n.startsWith('*') && n.includes('MODEL') && n.includes('SPACE'))) continue;
      for (const e of ents) out.push(e);
    }
    return out;
  }

  function dwgInsertMatrix(insert, basePoint) {
    const ix = Number(insert.insertionPoint?.x) || 0;
    const iy = Number(insert.insertionPoint?.y) || 0;
    const iz = Number(insert.insertionPoint?.z) || 0;
    let sx = Number(insert.xScale);
    let sy = Number(insert.yScale);
    let sz = Number(insert.zScale);
    if (!sx) sx = 1;
    if (!sy) sy = 1;
    if (!sz) sz = 1;
    const rot = Number(insert.rotation) || 0;
    const bx = Number(basePoint?.x) || 0;
    const by = Number(basePoint?.y) || 0;
    const bz = Number(basePoint?.z) || 0;
    const m = new THREE.Matrix4();
    const T1 = new THREE.Matrix4().makeTranslation(ix, iy, iz);
    const R = new THREE.Matrix4().makeRotationZ(rot);
    const S = new THREE.Matrix4().makeScale(sx, sy, sz);
    const T0 = new THREE.Matrix4().makeTranslation(-bx, -by, -bz);
    m.copy(T1).multiply(R).multiply(S).multiply(T0);
    return m;
  }

  function dwgAddLineSegments(points, group) {
    if (points.length < 2) return;
    const positions = [];
    for (let i = 0; i < points.length - 1; i++) {
      const a = points[i];
      const b = points[i + 1];
      positions.push(a.x, a.y, a.z, b.x, b.y, b.z);
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    group.add(new THREE.LineSegments(geom, new THREE.LineBasicMaterial({ color: 0xd3d3d3 })));
  }

  function dwgArcPoints(center, radius, startRad, endRad, segments) {
    const pts = [];
    for (let i = 0; i <= segments; i++) {
      const t = startRad + (endRad - startRad) * (i / segments);
      pts.push(new THREE.Vector3(
        center.x + radius * Math.cos(t),
        center.y + radius * Math.sin(t),
        center.z
      ));
    }
    return pts;
  }

  function dwgAddMeshQuad(group, c1, c2, c3, c4) {
    const positions = new Float32Array([
      c1.x, c1.y, c1.z, c2.x, c2.y, c2.z, c3.x, c3.y, c3.z,
      c1.x, c1.y, c1.z, c3.x, c3.y, c3.z, c4.x, c4.y, c4.z
    ]);
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    g.computeVertexNormals();
    group.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color: 0x9ca3af, side: THREE.DoubleSide })));
  }

  function dwgAddHatchEntity(ent, group, matrix) {
    const paths = ent.boundaryPaths;
    if (!paths || !paths.length) return;
    const z0 = 0;
    for (const path of paths) {
      if (path.vertices && path.vertices.length) {
        const pts = path.vertices.map((v) => dwgPt({ x: v.x, y: v.y, z: z0 }, matrix));
        const closed = path.isClosed;
        if (closed && pts.length > 2) dwgAddLineSegments(pts.concat(pts[0]), group);
        else dwgAddLineSegments(pts, group);
      } else if (path.edges && path.edges.length) {
        for (const edge of path.edges) {
          const et = edge.type;
          if (et === 1 || et === 'Line') {
            const a = dwgPt({ x: edge.start.x, y: edge.start.y, z: z0 }, matrix);
            const b = dwgPt({ x: edge.end.x, y: edge.end.y, z: z0 }, matrix);
            dwgAddLineSegments([a, b], group);
          } else if (et === 2 || et === 'Circular') {
            const c = new THREE.Vector3(Number(edge.center?.x) || 0, Number(edge.center?.y) || 0, Number(edge.center?.z) || 0);
            const r = Number(edge.radius) || 0;
            const sa = Number(edge.startAngle) || 0;
            const ea = Number(edge.endAngle) || 0;
            const pts = dwgArcPoints(c, r, sa, ea, Math.max(8, Math.ceil(Math.abs(ea - sa) / (Math.PI / 16))));
            if (matrix) for (const p of pts) p.applyMatrix4(matrix);
            dwgAddLineSegments(pts, group);
          } else if (et === 3 || et === 'Elliptic') {
            const center = new THREE.Vector3(Number(edge.center?.x) || 0, Number(edge.center?.y) || 0, 0);
            const majAxis = new THREE.Vector3(Number(edge.end?.x) || 0, Number(edge.end?.y) || 0, 0);
            const majLen = majAxis.length();
            const minLen = Number(edge.lengthOfMinorAxis) || 0;
            if (majLen < 1e-12) continue;
            const axisRatio = minLen / majLen;
            const sa = Number(edge.startAngle) || 0;
            const ea = Number(edge.endAngle) || Math.PI * 2;
            const ext = new THREE.Vector3(0, 0, 1);
            let minDir = new THREE.Vector3().crossVectors(ext, majAxis);
            if (minDir.lengthSq() < 1e-12) minDir = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), majAxis);
            minDir.normalize().multiplyScalar(majLen * axisRatio);
            const segs = Math.max(8, Math.ceil(Math.abs(ea - sa) / (Math.PI / 16)));
            const pts = [];
            for (let i = 0; i <= segs; i++) {
              const u = sa + (ea - sa) * (i / segs);
              const p = center.clone().add(majAxis.clone().multiplyScalar(Math.cos(u))).add(minDir.clone().multiplyScalar(Math.sin(u)));
              if (matrix) p.applyMatrix4(matrix);
              pts.push(p);
            }
            dwgAddLineSegments(pts, group);
          } else if (et === 4 || et === 'Spline') {
            const cps = edge.controlPoints;
            if (cps && cps.length) {
              const pts = cps.map((p) => dwgPt({ x: p.x, y: p.y, z: 0 }, matrix));
              dwgAddLineSegments(pts, group);
            }
          }
        }
      }
    }
  }

  /** SVG transform list (translate / rotate deg / scale / matrix 6) — left-to-right matches SvgConverter / SVG. */
  function dwgSvgParseTransformAttr(attr) {
    const out = new THREE.Matrix4();
    if (!attr || !String(attr).trim()) return out;
    const re = /(matrix|translate|rotate|scale)\s*\(([^)]+)\)/gi;
    let m;
    while ((m = re.exec(attr))) {
      const name = m[1].toLowerCase();
      const args = m[2].trim().split(/[\s,]+/).map(parseFloat);
      const step = new THREE.Matrix4();
      if (name === 'matrix' && args.length >= 6) {
        const a = args[0], b = args[1], c = args[2], d = args[3], e = args[4], f = args[5];
        step.set(a, b, 0, 0, c, d, 0, 0, 0, 0, 1, 0, e, f, 0, 1);
      } else if (name === 'translate') {
        step.makeTranslation(args[0] || 0, args[1] || 0, 0);
      } else if (name === 'scale') {
        const sx = args[0] != null ? args[0] : 1;
        const sy = args[1] != null ? args[1] : sx;
        step.makeScale(sx, sy, 1);
      } else if (name === 'rotate') {
        step.makeRotationZ((args[0] || 0) * Math.PI / 180);
      }
      out.multiply(step);
    }
    return out;
  }

  function dwgSvgParsePointsAttr(s) {
    if (!s || typeof s !== 'string') return [];
    const parts = s.trim().split(/[\s,]+/).filter(Boolean);
    const out = [];
    for (let i = 0; i + 1 < parts.length; i += 2) {
      out.push({ x: parseFloat(parts[i]), y: parseFloat(parts[i + 1]) });
    }
    return out;
  }

  /**
   * When vector entity conversion draws nothing, libredwg's dwg_to_svg(db) may still emit SVG
   * (blocks as defs + use). Walk the tree and convert line/polyline/circle/ellipse to THREE segments.
   */
  function dwgAppendSvgToGroup(svgString, group) {
    if (!svgString || typeof svgString !== 'string' || svgString.length < 24) return 0;
    let added = 0;
    let doc;
    try {
      doc = new DOMParser().parseFromString(svgString, 'image/svg+xml');
    } catch (_) {
      return 0;
    }
    if (doc.querySelector('parsererror')) return 0;
    const root = doc.documentElement;
    if (!root || String(root.tagName).toLowerCase() !== 'svg') return 0;

    function applyPt(mat, x, y) {
      return new THREE.Vector3(x, y, 0).applyMatrix4(mat);
    }

    function addSeg(mat, x1, y1, x2, y2) {
      const a = applyPt(mat, x1, y1);
      const b = applyPt(mat, x2, y2);
      dwgAddLineSegments([a, b], group);
      added++;
    }

    function addPoly(mat, pts, closed) {
      if (!pts || pts.length < 2) return;
      const v = pts.map((p) => applyPt(mat, p.x, p.y));
      if (closed && v.length > 2) dwgAddLineSegments(v.concat(v[0]), group);
      else dwgAddLineSegments(v, group);
      added++;
    }

    function walk(node, mat) {
      if (!node || node.nodeType !== 1) return;
      const tag = String(node.tagName).toLowerCase();
      if (tag === 'defs') return;
      const local = dwgSvgParseTransformAttr(node.getAttribute('transform'));
      const M = new THREE.Matrix4().multiplyMatrices(mat, local);

      if (tag === 'g') {
        for (let c = node.firstElementChild; c; c = c.nextElementSibling) walk(c, M);
        return;
      }
      if (tag === 'use') {
        const href = (node.getAttribute('href') || node.getAttribute('xlink:href') || '').trim();
        const id = href.replace(/^#/, '');
        if (!id) return;
        let target = doc.getElementById(id);
        if (!target) {
          try {
            target = doc.querySelector('[id="' + id.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]');
          } catch (_) {}
        }
        if (!target) return;
        walk(target, M);
        return;
      }
      if (tag === 'line') {
        const x1 = parseFloat(node.getAttribute('x1')) || 0;
        const y1 = parseFloat(node.getAttribute('y1')) || 0;
        const x2 = parseFloat(node.getAttribute('x2')) || 0;
        const y2 = parseFloat(node.getAttribute('y2')) || 0;
        addSeg(M, x1, y1, x2, y2);
        return;
      }
      if (tag === 'polyline' || tag === 'polygon') {
        const pts = dwgSvgParsePointsAttr(node.getAttribute('points'));
        addPoly(M, pts, tag === 'polygon');
        return;
      }
      if (tag === 'circle') {
        const cx = parseFloat(node.getAttribute('cx')) || 0;
        const cy = parseFloat(node.getAttribute('cy')) || 0;
        const r = parseFloat(node.getAttribute('r')) || 0;
        if (r <= 0) return;
        const arc = [];
        for (let i = 0; i <= 48; i++) {
          const u = (i / 48) * Math.PI * 2;
          arc.push(applyPt(M, cx + r * Math.cos(u), cy + r * Math.sin(u)));
        }
        dwgAddLineSegments(arc, group);
        added++;
        return;
      }
      if (tag === 'ellipse') {
        const cx = parseFloat(node.getAttribute('cx')) || 0;
        const cy = parseFloat(node.getAttribute('cy')) || 0;
        const rx = parseFloat(node.getAttribute('rx')) || 0;
        const ry = parseFloat(node.getAttribute('ry')) || 0;
        if (rx <= 0 || ry <= 0) return;
        const arc = [];
        for (let i = 0; i <= 48; i++) {
          const u = (i / 48) * Math.PI * 2;
          arc.push(applyPt(M, cx + rx * Math.cos(u), cy + ry * Math.sin(u)));
        }
        dwgAddLineSegments(arc, group);
        added++;
        return;
      }
      if (tag === 'path') {
        const d = node.getAttribute('d');
        if (!d || !d.trim()) return;
        const host = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        host.setAttribute('width', '1');
        host.setAttribute('height', '1');
        host.style.cssText = 'position:absolute;left:-99999px;visibility:hidden';
        const pe = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pe.setAttribute('d', d);
        host.appendChild(pe);
        document.body.appendChild(host);
        try {
          const len = pe.getTotalLength();
          if (!(len > 0)) return;
          const n = Math.max(16, Math.min(256, Math.ceil(len / 4)));
          const pts = [];
          for (let i = 0; i <= n; i++) {
            const p = pe.getPointAtLength(len * (i / n));
            pts.push(applyPt(M, p.x, p.y));
          }
          dwgAddLineSegments(pts, group);
          added++;
        } catch (_) {
        } finally {
          document.body.removeChild(host);
        }
      }
    }

    for (let c = root.firstElementChild; c; c = c.nextElementSibling) walk(c, new THREE.Matrix4());
    return added;
  }

  function dwgAddEntitiesToGroup(entities, group, matrix, blockMap, depth) {
    entities = dwgToArray(entities);
    if (!entities.length) return;
    const m = matrix || null;
    const bm = blockMap || new Map();
    const d = depth | 0;
    for (const ent of entities) {
      const t = String(ent.type || '').toUpperCase();
      try {
        if (t === 'INSERT') {
          if (d >= DWG_INSERT_MAX_DEPTH) continue;
          const block = dwgFindBlock(bm, ent.name);
          if (block && block.entities && block.entities.length) {
            const base = block.basePoint || { x: 0, y: 0, z: 0 };
            const localM = dwgInsertMatrix(ent, base);
            const combined = m ? new THREE.Matrix4().multiplyMatrices(m, localM) : localM;
            dwgAddEntitiesToGroup(block.entities, group, combined, bm, d + 1);
          }
          continue;
        }
        if (t === 'LINE') {
          const a = dwgPt(ent.startPoint, m);
          const b = dwgPt(ent.endPoint, m);
          dwgAddLineSegments([a, b], group);
        } else if (t === 'ARC') {
          const c = dwgVec3(ent.center);
          const r = Number(ent.radius) || 0;
          const sa = Number(ent.startAngle) || 0;
          const ea = Number(ent.endAngle) || 0;
          const pts = dwgArcPoints(c, r, sa, ea, Math.max(8, Math.ceil(Math.abs(ea - sa) / (Math.PI / 16))));
          if (m) for (const p of pts) p.applyMatrix4(m);
          dwgAddLineSegments(pts, group);
        } else if (t === 'CIRCLE') {
          const c = dwgVec3(ent.center);
          const r = Number(ent.radius) || 0;
          const pts = dwgArcPoints(c, r, 0, Math.PI * 2, 48);
          if (m) for (const p of pts) p.applyMatrix4(m);
          dwgAddLineSegments(pts, group);
        } else if (t === 'ELLIPSE') {
          const center = new THREE.Vector3(Number(ent.center?.x) || 0, Number(ent.center?.y) || 0, Number(ent.center?.z) || 0);
          const majAxis = new THREE.Vector3(Number(ent.majorAxisEndPoint?.x) || 0, Number(ent.majorAxisEndPoint?.y) || 0, Number(ent.majorAxisEndPoint?.z) || 0);
          const ratio = Number(ent.axisRatio) || 1;
          const sa = Number(ent.startAngle) || 0;
          const ea = Number(ent.endAngle) != null ? Number(ent.endAngle) : Math.PI * 2;
          const majLen = majAxis.length();
          if (majLen < 1e-12) continue;
          let ext = new THREE.Vector3(Number(ent.extrusionDirection?.x) || 0, Number(ent.extrusionDirection?.y) || 0, Number(ent.extrusionDirection?.z) || 1);
          if (ext.lengthSq() < 1e-12) ext.set(0, 0, 1);
          ext.normalize();
          const majU = majAxis.clone().normalize();
          let minDir = new THREE.Vector3().crossVectors(ext, majAxis);
          if (minDir.lengthSq() < 1e-12) minDir = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), majAxis);
          minDir.normalize().multiplyScalar(majLen * ratio);
          const segs = Math.max(8, Math.ceil(Math.abs(ea - sa) / (Math.PI / 16)));
          const pts = [];
          for (let i = 0; i <= segs; i++) {
            const u = sa + (ea - sa) * (i / segs);
            const p = center.clone().add(majAxis.clone().multiplyScalar(Math.cos(u))).add(minDir.clone().multiplyScalar(Math.sin(u)));
            if (m) p.applyMatrix4(m);
            pts.push(p);
          }
          dwgAddLineSegments(pts, group);
        } else if (t === 'LWPOLYLINE' && ent.vertices && ent.vertices.length) {
          const elev = Number(ent.elevation) || 0;
          const pts = ent.vertices.map((v) => dwgPt({ x: v.x, y: v.y, z: elev }, m));
          const closed = (ent.flag & 1) !== 0;
          if (closed && pts.length > 2) dwgAddLineSegments(pts.concat(pts[0]), group);
          else dwgAddLineSegments(pts, group);
        } else if (t === 'POLYLINE3D' && ent.vertices && ent.vertices.length) {
          const pts = ent.vertices.map((v) => dwgPt(v, m));
          const closed = (ent.flag & 1) !== 0;
          if (closed && pts.length > 2) dwgAddLineSegments(pts.concat(pts[0]), group);
          else dwgAddLineSegments(pts, group);
        } else if (t === 'POLYLINE2D' && ent.vertices && ent.vertices.length) {
          const pts = ent.vertices.map((v) => dwgPt(v, m));
          const closed = (ent.flag & 1) !== 0;
          if (closed && pts.length > 2) dwgAddLineSegments(pts.concat(pts[0]), group);
          else dwgAddLineSegments(pts, group);
        } else if (t === 'SOLID') {
          const c1 = dwgPt({ x: ent.corner1.x, y: ent.corner1.y, z: 0 }, m);
          const c2 = dwgPt({ x: ent.corner2.x, y: ent.corner2.y, z: 0 }, m);
          const c3 = dwgPt({ x: ent.corner3.x, y: ent.corner3.y, z: 0 }, m);
          const c4 = ent.corner4 ? dwgPt({ x: ent.corner4.x, y: ent.corner4.y, z: 0 }, m) : c3.clone();
          dwgAddMeshQuad(group, c1, c2, c3, c4);
        } else if (t === '3DFACE') {
          const c1 = dwgPt(ent.corner1, m);
          const c2 = dwgPt(ent.corner2, m);
          const c3 = dwgPt(ent.corner3, m);
          const c4 = ent.corner4 ? dwgPt(ent.corner4, m) : c3.clone();
          dwgAddMeshQuad(group, c1, c2, c3, c4);
        } else if (t === 'MLINE' && ent.vertices && ent.vertices.length) {
          const pts = ent.vertices.map((v) => dwgPt(v.vertex ? v.vertex : v, m));
          const closed = (ent.flags & 2) !== 0;
          if (closed && pts.length > 2) dwgAddLineSegments(pts.concat(pts[0]), group);
          else dwgAddLineSegments(pts, group);
        } else if (t === 'SPLINE') {
          let pts = [];
          if (ent.fitPoints && ent.fitPoints.length) {
            pts = ent.fitPoints.map((p) => dwgPt(p, m));
          } else if (ent.controlPoints && ent.controlPoints.length) {
            pts = ent.controlPoints.map((p) => dwgPt(p, m));
          }
          if (pts.length >= 2) dwgAddLineSegments(pts, group);
        } else if (t === 'HATCH') {
          dwgAddHatchEntity(ent, group, m);
        } else if (t === 'POINT' && ent.position) {
          const c = dwgPt(ent.position, m);
          const s = Math.max(1e-4, Number(ent.thickness) || 0.05);
          dwgAddLineSegments([new THREE.Vector3(c.x - s, c.y, c.z), new THREE.Vector3(c.x + s, c.y, c.z)], group);
          dwgAddLineSegments([new THREE.Vector3(c.x, c.y - s, c.z), new THREE.Vector3(c.x, c.y + s, c.z)], group);
          dwgAddLineSegments([new THREE.Vector3(c.x, c.y, c.z - s), new THREE.Vector3(c.x, c.y, c.z + s)], group);
        } else if (t === 'RAY' && ent.firstPoint && ent.unitDirection) {
          const scale = 1e6;
          const fp = ent.firstPoint;
          const ud = ent.unitDirection;
          const dx = Number(ud.x) || 0;
          const dy = Number(ud.y) || 0;
          const dz = Number(ud.z) || 0;
          const len = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
          const ux = dx / len;
          const uy = dy / len;
          const uz = dz / len;
          const a = dwgPt(fp, m);
          const b = dwgPt({ x: fp.x + ux * scale, y: fp.y + uy * scale, z: fp.z + uz * scale }, m);
          dwgAddLineSegments([a, b], group);
        } else if (t === 'XLINE' && ent.firstPoint && ent.unitDirection) {
          const scale = 1e6;
          const fp = ent.firstPoint;
          const ud = ent.unitDirection;
          const dx = Number(ud.x) || 0;
          const dy = Number(ud.y) || 0;
          const dz = Number(ud.z) || 0;
          const len = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
          const ux = dx / len;
          const uy = dy / len;
          const uz = dz / len;
          const a = dwgPt({ x: fp.x - ux * scale, y: fp.y - uy * scale, z: fp.z - uz * scale }, m);
          const b = dwgPt({ x: fp.x + ux * scale, y: fp.y + uy * scale, z: fp.z + uz * scale }, m);
          dwgAddLineSegments([a, b], group);
        } else if (t === 'LEADER' && ent.vertices && ent.vertices.length >= 2) {
          const pts = ent.vertices.map((v) => dwgPt(
            { x: v.x, y: v.y, z: v.z != null ? v.z : 0 },
            m
          ));
          dwgAddLineSegments(pts, group);
        } else if (t === 'DIMENSION' && ent.definitionPoint && ent.textPoint) {
          const a = dwgPt(ent.definitionPoint, m);
          const b = dwgPt(ent.textPoint, m);
          dwgAddLineSegments([a, b], group);
        }
      } catch (e) {
        console.warn('DWG entity skip:', t, e);
      }
    }
  }

  async function parseDwg(buffer) {
    const mod = await import(LIBREDWG_CDN + '/dist/libredwg-web.js');
    const LibreDwg = mod.LibreDwg;
    const Dwg_File_Type = mod.Dwg_File_Type;
    if (!LibreDwg || !Dwg_File_Type) throw new Error('LibreDWG module not loaded');
    const lib = await LibreDwg.create(getCadWasmBaseUrl());
    const ptr = lib.dwg_read_data(buffer, Dwg_File_Type.DWG);
    if (ptr === undefined || ptr === null || ptr === 0) {
      throw new Error('Could not read DWG data');
    }
    let db;
    try {
      if (typeof lib.convertEx === 'function') {
        const ex = lib.convertEx(ptr);
        db = ex && ex.database;
        if (ex && ex.stats != null) {
          try {
            console.debug('LibreDWG convertEx stats', ex.stats);
          } catch (_) {}
        }
      }
      if (!db && typeof lib.convert === 'function') {
        db = lib.convert(ptr);
      }
    } finally {
      try { lib.dwg_free(ptr); } catch (_) {}
    }
    if (!db) throw new Error('DWG conversion produced no data');
    if (!dwgDatabaseHasAnyEntities(db) && typeof lib.convert === 'function') {
      const ptr2 = lib.dwg_read_data(buffer, Dwg_File_Type.DWG);
      if (ptr2) {
        try {
          const alt = lib.convert(ptr2);
          if (alt && dwgDatabaseHasAnyEntities(alt)) db = alt;
        } finally {
          try { lib.dwg_free(ptr2); } catch (_) {}
        }
      }
    }
    const blockMap = dwgBuildBlockMap(db);
    let modelEntities = dwgGetPrimaryEntities(db);
    if (!modelEntities.length) {
      const ms = dwgFindBlock(blockMap, '*Model_Space') || dwgFindBlock(blockMap, '*MODEL_SPACE');
      if (ms && ms.entities && ms.entities.length) modelEntities = ms.entities;
    }
    if (!modelEntities.length) {
      modelEntities = dwgMergeEntitiesFromAllBlockDefinitions(db);
    }
    const group = new THREE.Group();
    dwgAddEntitiesToGroup(modelEntities, group, null, blockMap, 0);
    if (group.children.length === 0) {
      const named = dwgCollectNamedBlockEntities(db);
      if (named.length) dwgAddEntitiesToGroup(named, group, null, blockMap, 0);
    }
    if (group.children.length === 0) {
      try {
        if (typeof lib.dwg_to_svg === 'function') {
          const svg = lib.dwg_to_svg(db);
          dwgAppendSvgToGroup(svg, group);
        }
      } catch (e) {
        console.warn('DWG SVG fallback failed', e);
      }
    }
    if (group.children.length === 0) {
      const err = new Error(
        'DWG contains unsupported ACIS solids/proxy entities. Workaround: Export as STEP (.stp) for 3D solids, or DXF with exploded geometry.'
      );
      err.code = 'DWG_NO_DRAWABLE_MESHES';
      throw err;
    }
    return { success: true, threeRoot: group };
  }

  function updateLoadedFilesPanel() {
    if (!loadedFilesList) return;
    loadedFilesList.innerHTML = '';
    if (loadedFiles.length === 0) {
      loadedFilesList.innerHTML = '<p class="text-sm text-slate-500 dark:text-slate-400">No files loaded. Import an IGES, STEP, DXF, IFC, 3DM, DWG, or GLB file.</p>';
      clearCad();
      activeFileId = null;
      return;
    }
    loadedFiles.forEach((entry) => {
      const isActive = activeFileId === entry.id;
      const format = entry.format || detectFormat(entry.name);
      const formatLabel = { iges: 'IGES', step: 'STEP', dxf: 'DXF', ifc: 'IFC', '3dm': '3DM', dwg: 'DWG', glb: 'GLB' }[format] || 'CAD';
      const radioId = 'corintis-loaded-file-' + String(entry.id).replace(/[^a-z0-9-]/gi, '-');
      const row = document.createElement('div');
      row.className = 'flex items-center p-4 gap-4 rounded-xl bg-white/10 dark:bg-slate-800/30 backdrop-blur-md border border-white/20 dark:border-slate-600/50 hover:border-white/30 dark:hover:border-slate-500/50 transition-all active:scale-95 group';
      row.innerHTML = `
        <div class="flex-shrink-0 flex items-center">
          <input type="radio" name="corintis-loaded-file" id="${radioId}" class="w-5 h-5 text-primary border-slate-300 dark:border-slate-500 bg-transparent focus:ring-primary cursor-pointer" data-file-id="${entry.id}" ${isActive ? 'checked' : ''}/>
        </div>
        <label for="${radioId}" class="flex-1 min-w-0 cursor-pointer">
          <p class="text-sm font-medium text-slate-800 dark:text-slate-200 truncate" title="${escapeHtmlCad(entry.name)}">${escapeHtmlCad(entry.name)}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 truncate">${formatLabel}${entry.fromPlatform && entry.platformProjectTitle ? ' · ' + escapeHtmlCad(entry.platformProjectTitle) : ''}</p>
        </label>
        <div class="flex items-center gap-1 flex-shrink-0">
          ${entry.fromPlatform ? '' : `<button type="button" class="corintis-delete-file p-2 text-slate-500 hover:text-red-500 hover:bg-white/20 dark:hover:bg-slate-700/50 rounded-lg transition-colors" data-file-id="${entry.id}" title="Delete file">
            <span class="material-symbols-outlined text-[18px]">delete</span>
          </button>`}
        </div>
      `;
      row.querySelector('input').addEventListener('change', async (e) => {
        const id = e.target.dataset.fileId;
        if (id && e.target.checked) {
          activeFileId = id;
          const ent = loadedFiles.find((f) => String(f.id) === String(id));
          if (ent) {
            try {
              const result = await parseIfNeeded(ent);
              buildMeshesFromResult(result, ent.format || detectFormat(ent.name));
            } catch (err) {
              console.error('Load error:', err);
              const fmt = ent.format || detectFormat(ent.name);
              showError(err?.message || 'Failed to load file');
              handleCadConversionRouting(err, fmt, ent);
            }
          }
          updateLoadedFilesPanel();
        }
      });
      const delBtn = row.querySelector('.corintis-delete-file');
      if (delBtn) {
        delBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = row.querySelector('input').dataset.fileId;
          if (!id) return;
          const idx = loadedFiles.findIndex((f) => String(f.id) === String(id));
          if (idx < 0) return;
          loadedFiles.splice(idx, 1);
          try {
            await deleteFromServer(id);
          } catch (err) {
            console.warn('Could not delete from server:', err);
          }
          try {
            await removeFromRepository(id);
          } catch (err) {
            console.warn('Could not remove from repository:', err);
          }
          if (String(activeFileId) === String(id)) {
            activeFileId = loadedFiles.length > 0 ? loadedFiles[0].id : null;
            if (loadedFiles.length > 0) {
              const ent = loadedFiles[0];
              try {
                const result = await parseIfNeeded(ent);
                buildMeshesFromResult(result, ent.format || detectFormat(ent.name));
              } catch (err) {
                clearCad();
                const fmt = ent.format || detectFormat(ent.name);
                showError(err?.message || 'Failed to load file');
                handleCadConversionRouting(err, fmt, ent);
              }
            }
          }
          updateLoadedFilesPanel();
        });
      }
      loadedFilesList.appendChild(row);
    });
  }

  async function parseCadBufferForLoadedList(name, buffer) {
    const format = detectFormat(name);
    let bufferForStorage = buffer.slice(0);
    if (format === 'iges') {
      await runPreScanWithProgress(buffer, (status, progress) => {
        updateLoadingProgress(status, progress);
      });
    } else if (format === 'step') {
      const text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
      for (let i = 0; i <= 100; i += 10) {
        updateLoadingProgress(`Reading STEP file… ${i}%`, i);
        await new Promise((r) => setTimeout(r, 30));
      }
    } else if (format === 'dxf') {
      updateLoadingProgress('Parsing DXF…', 30);
    } else if (format === 'ifc') {
      updateLoadingProgress('Parsing IFC…', 30);
    } else if (format === '3dm') {
      updateLoadingProgress('Parsing 3DM (Rhino)…', 30);
    } else if (format === 'dwg') {
      updateLoadingProgress('Parsing DWG…', 30);
    } else if (format === 'glb') {
      updateLoadingProgress('Parsing GLB…', 30);
    }
    updateLoadingProgress('Building 3D geometry…', 95);
    const bufferForWorker = buffer.slice(0);
    let result;
    let displayName = name;
    let outFormat = format;
    if (format === '3dm' || format === 'dwg') {
      const ctx = {
        name: displayName,
        buffer: bufferForWorker,
        format,
        _cadConversionAttempted: false
      };
      const mw = await parseCadWithConversionMiddleware(ctx, parseCadBufferForEntry);
      result = mw.result;
      bufferForStorage = mw.buffer instanceof ArrayBuffer ? mw.buffer.slice(0) : mw.buffer;
      displayName = mw.name;
      outFormat = mw.format;
    } else if (format === 'dxf') {
      result = await parseDxf(bufferForWorker);
    } else if (format === 'ifc') {
      result = await parseIfc(bufferForWorker);
    } else if (format === 'glb') {
      result = await parseGltf(bufferForWorker);
    } else {
      result = await parseOcctInWorker(bufferForWorker, format);
      if ((format === 'step' || format === 'stp') && (!result?.meshes || result.meshes.length === 0)) {
        updateLoadingProgress('Retrying with relaxed settings…', 90);
        const retry = await parseOcctInWorker(buffer.slice(0), format, { linearDeflection: 0.2, angularDeflection: 1 });
        if (retry?.meshes && retry.meshes.length > 0) result = retry;
      }
    }
    if (!(format === '3dm' || format === 'dwg')) {
      assertCadHasRenderableMeshesOrThrow(outFormat, result, null);
    }
    return { displayName, outFormat, bufferForStorage, result };
  }

  async function addFileToLoadedList(name, buffer) {
    const { displayName, outFormat, bufferForStorage, result } = await parseCadBufferForLoadedList(name, buffer);
    const id = Date.now();
    const entry = { id, name: displayName, format: outFormat, result, buffer: bufferForStorage, createdAt: id };
    loadedFiles.push(entry);
    try {
      await saveToRepository(entry);
    } catch (e) {
      console.warn('Could not save to repository:', e);
    }
    try {
      await uploadToServer(entry);
    } catch (e) {
      console.warn('Could not upload to server:', e);
    }
    activeFileId = id;
    buildMeshesFromResult(result, outFormat);
    updateLoadedFilesPanel();
    const loadedPanel = floatingPanelsContainer?.querySelector('[data-panel-id="loaded"]');
    if (loadedPanel && !isPanelOpen(loadedPanel)) {
      setPanelOpen(loadedPanel, true);
    }
  }

  async function loadPlatformCadFile(platformFileId, originalName, projectTitle) {
    showLoading('Loading project file…', 'Downloading…', 10);
    try {
      const res = await fetch('/api/iris-files-download.php?id=' + encodeURIComponent(String(platformFileId)), {
        credentials: 'same-origin',
        cache: 'no-store'
      });
      if (!res.ok) {
        let errTxt = 'Download failed';
        try {
          const j = await res.json();
          if (j.error) errTxt = j.error;
        } catch (_) {}
        throw new Error(errTxt);
      }
      const buffer = await res.arrayBuffer();
      updateLoadingProgress('Parsing geometry…', 40);
      const { displayName, outFormat, bufferForStorage, result } = await parseCadBufferForLoadedList(originalName || 'model', buffer);
      const id = 'plat-' + String(platformFileId);
      const existing = loadedFiles.findIndex((f) => String(f.id) === String(id));
      if (existing >= 0) loadedFiles.splice(existing, 1);
      const entry = {
        id,
        name: displayName,
        format: outFormat,
        result,
        buffer: bufferForStorage,
        createdAt: Date.now(),
        fromPlatform: true,
        platformNumericId: Number(platformFileId),
        platformProjectTitle: projectTitle || ''
      };
      loadedFiles.push(entry);
      activeFileId = id;
      buildMeshesFromResult(result, outFormat);
      updateLoadedFilesPanel();
      const loadedPanel = floatingPanelsContainer?.querySelector('[data-panel-id="loaded"]');
      if (loadedPanel && !isPanelOpen(loadedPanel)) {
        setPanelOpen(loadedPanel, true);
      }
      notifyToast('success', 'Loaded from project workspace');
    } catch (err) {
      console.error(err);
      showError(err?.message || 'Could not load project file');
      notifyToast('error', err?.message || 'Could not load project file');
    } finally {
      hideLoading();
    }
  }

  async function hydrateProjectLibrary() {
    const wrap = document.getElementById('corintis-project-library-wrap');
    const lib = document.getElementById('corintis-project-library');
    if (!wrap || !lib) return;
    wrap.classList.remove('hidden');
    lib.innerHTML = '<p class="text-xs text-slate-500 dark:text-slate-400 px-1">Loading project files…</p>';
    const allowedFileIds = new Set();
    try {
      const res = await fetch('/api/iris-cad-explorer-files.php', { credentials: 'same-origin', cache: 'no-store' });
      const data = await res.json().catch(() => ({}));

      if (res.ok && data.ok) {
        for (const pr of data.projects || []) {
          for (const f of pr.files || []) {
            allowedFileIds.add(Number(f.id));
          }
        }
      }

      await pruneInaccessiblePlatformLoadedFiles(allowedFileIds);

      if (!res.ok || !data.ok) {
        const msg = (data && data.error) ? String(data.error) : 'Could not load project library';
        lib.innerHTML = '<p class="text-xs text-slate-500 dark:text-slate-400 px-1">' + escapeHtmlCad(msg) + '</p>';
        return;
      }
      const projects = data.projects || [];
      if (projects.length === 0) {
        lib.innerHTML =
          '<p class="text-xs text-slate-500 dark:text-slate-400 px-1">' +
          'No CAD files in projects with CAD Explorer enabled. Add files from the dashboard project workspace.</p>';
        return;
      }
      lib.innerHTML = '';
      projects.forEach((proj, idx) => {
        const det = document.createElement('details');
        det.className = 'rounded-lg border border-white/20 dark:border-slate-600/50 bg-white/5 dark:bg-slate-800/20';
        if (idx === 0) det.open = true;
        const sum = document.createElement('summary');
        sum.className =
          'cursor-pointer text-xs font-semibold text-slate-700 dark:text-slate-200 px-2 py-1.5 flex items-center gap-1 select-none';
        const ic = document.createElement('span');
        ic.className = 'material-symbols-outlined text-sm';
        ic.textContent = 'folder';
        const ttl = document.createElement('span');
        ttl.textContent = proj.project_name || ('Project ' + proj.project_id);
        sum.appendChild(ic);
        sum.appendChild(ttl);
        det.appendChild(sum);
        const body = document.createElement('div');
        body.className = 'px-2 pb-2 space-y-1';
        const hint = document.createElement('p');
        hint.className = 'text-[10px] text-slate-500 dark:text-slate-400 mb-1';
        hint.textContent = 'Stored in platform project workspace · click to load in viewer';
        body.appendChild(hint);
        const files = proj.files || [];
        files.forEach((f) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className =
            'w-full text-left text-xs py-1.5 px-2 rounded-md hover:bg-white/20 dark:hover:bg-slate-700/50 ' +
            'text-slate-800 dark:text-slate-100 border border-transparent hover:border-white/20';
          const nm = document.createElement('span');
          nm.className = 'font-medium truncate block';
          nm.textContent = f.original_name;
          const meta = document.createElement('span');
          meta.className = 'block text-[10px] text-slate-500 dark:text-slate-400';
          meta.textContent =
            formatBytesCad(f.byte_size) +
            (f.created_at ? ' · ' + new Date(f.created_at * 1000).toLocaleString() : '');
          btn.appendChild(nm);
          btn.appendChild(meta);
          btn.addEventListener('click', () => {
            loadPlatformCadFile(f.id, f.original_name, proj.project_name || '');
          });
          body.appendChild(btn);
        });
        det.appendChild(body);
        lib.appendChild(det);
      });
    } catch (e) {
      lib.innerHTML =
        '<p class="text-xs text-slate-500 dark:text-slate-400 px-1">' + escapeHtmlCad(e.message || 'Network error') + '</p>';
      /* Do not prune on network failure — membership may still be valid. */
    }
  }

  /**
   * Drop project-workspace viewer entries no longer returned by iris-cad-explorer-files.php
   * (removed from project, CAD disabled on project, or lost access).
   */
  async function pruneInaccessiblePlatformLoadedFiles(allowedFileIdSet) {
    const allowed = allowedFileIdSet instanceof Set ? allowedFileIdSet : new Set(Array.from(allowedFileIdSet || []));
    const retained = [];
    let removedActive = false;
    const prevActive = activeFileId;
    for (let i = 0; i < loadedFiles.length; i++) {
      const e = loadedFiles[i];
      if (e.fromPlatform) {
        const pid = typeof e.platformNumericId === 'number' ? e.platformNumericId : parseInt(String(e.platformNumericId), 10);
        if (!Number.isFinite(pid) || !allowed.has(pid)) {
          if (String(prevActive) === String(e.id)) removedActive = true;
          continue;
        }
      }
      retained.push(e);
    }
    if (retained.length === loadedFiles.length) return;
    loadedFiles.length = 0;
    retained.forEach((r) => loadedFiles.push(r));
    if (removedActive || (prevActive != null && !loadedFiles.some((r) => String(r.id) === String(prevActive)))) {
      activeFileId = loadedFiles.length > 0 ? loadedFiles[0].id : null;
      if (loadedFiles.length > 0) {
        const ent = loadedFiles[0];
        try {
          const result = await parseIfNeeded(ent);
          buildMeshesFromResult(result, ent.format || detectFormat(ent.name));
        } catch (err) {
          clearCad();
          const fmt = ent.format || detectFormat(ent.name);
          showError(err?.message || 'Failed to load file');
          handleCadConversionRouting(err, fmt, ent);
        }
      } else {
        clearCad();
        activeFileId = null;
      }
    }
    updateLoadedFilesPanel();
  }

  function restoreFromRepository(records) {
    loadedFiles = records.map((r) => ({
      id: r.id,
      name: r.name,
      format: r.format,
      result: r.result,
      buffer: r.buffer,
      createdAt: r.createdAt
    }));
    if (loadedFiles.length > 0) {
    }
    updateLoadedFilesPanel();
  }

  const resetPanelsBtn = document.getElementById('corintis-reset-panels');
  if (resetPanelsBtn) {
    resetPanelsBtn.addEventListener('click', () => resetPanelsToInitial());
  }

  const themeToggleBtn = document.getElementById('corintis-theme-toggle');
  if (themeToggleBtn && typeof ThemeService !== 'undefined') {
    themeToggleBtn.addEventListener('click', () => {
      const effective = ThemeService.resolveEffectiveTheme(ThemeService.getTheme());
      ThemeService.setTheme(effective === 'dark' ? 'light' : 'dark');
    });
  }

  const runCfdBtn = document.getElementById('corintis-run-cfd');
  if (runCfdBtn) {
    runCfdBtn.addEventListener('click', () => triggerAnalysis());
  }

  const redoCfdBtn = document.getElementById('corintis-redo-cfd');
  if (redoCfdBtn) {
    redoCfdBtn.addEventListener('click', () => {
      removeFlowLines();
      triggerAnalysis();
    });
  }

  const startCfdBtn = document.getElementById('corintis-start-cfd');
  if (startCfdBtn) {
    startCfdBtn.addEventListener('click', async () => {
      startCfdBtn.disabled = true;
      startCfdBtn.textContent = 'Starting…';
      const result = await startCfdServer();
      startCfdBtn.disabled = false;
      startCfdBtn.textContent = 'Start';
      if (result.ok) {
        updateCfdControlUI(true);
        notifyToast('success', 'CFD sidecar started.');
      } else {
        updateCfdControlUI(false);
        const statusEl = document.getElementById('cfd-status-text');
        if (statusEl) statusEl.textContent = 'CFD: ' + (result.error || 'Start failed');
        console.warn('CFD Start failed:', result.error);
        notifyToast('error', result.error || 'Failed to start CFD sidecar.');
      }
    });
  }

  const stopCfdBtn = document.getElementById('corintis-stop-cfd');
  if (stopCfdBtn) {
    stopCfdBtn.addEventListener('click', async () => {
      stopCfdBtn.disabled = true;
      await stopCfdServer();
      await pollCfdStatus();
      stopCfdBtn.disabled = false;
      notifyToast('info', 'CFD sidecar stop requested.');
    });
  }

  startCfdStatusPoll();

  const importInputEl = document.getElementById('import-cad-input');
  if (importInputEl) {
    importInputEl.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const format = detectFormat(file.name);
      let buffer = null;
      try {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
        const formatLabel = { iges: 'IGES', step: 'STEP', dxf: 'DXF', ifc: 'IFC', '3dm': '3DM', dwg: 'DWG', glb: 'GLB' }[format] || 'CAD';
        showLoading(
          `Importing ${formatLabel} (${sizeMB} MB)…`,
          'Reading file…',
          0
        );
        buffer = await file.arrayBuffer();
        await addFileToLoadedList(file.name, buffer);
        hideLoading();
        notifyToast('success', `Imported ${file.name}`);
      } catch (err) {
        console.error('Import CAD error:', err);
        hideLoading();
        const msg = err?.message || 'Failed to import CAD file';
        showError(msg);
        handleCadConversionRouting(err, format, buffer ? { name: file.name, buffer, format } : null);
      }
      importInputEl.value = '';
    });
  }

  const clippingEnable = document.getElementById('clipping-enable');
  const clippingSlider = document.getElementById('clipping-slider');
  const opacitySlider = document.getElementById('opacity-slider');
  const opacityValueEl = document.getElementById('opacity-value');
  const axisBtns = document.querySelectorAll('.clipping-axis-btn');

  if (clippingEnable) {
    clippingEnable.addEventListener('change', () => {
      clippingEnabled = clippingEnable.checked;
      if (clippingSlider) clippingSlider.disabled = !clippingEnabled;
      applyClippingToMeshes();
    });
  }

  if (clippingSlider) {
    clippingSlider.addEventListener('input', () => {
      clippingValue = parseInt(clippingSlider.value, 10) / 100;
      applyClippingToMeshes();
    });
  }

  axisBtns.forEach((btn) => {
    btn.addEventListener('click', () => {
      clippingAxis = btn.dataset.axis;
      axisBtns.forEach((b) => {
        b.classList.toggle('bg-primary/20', b.dataset.axis === clippingAxis);
        b.classList.toggle('text-primary', b.dataset.axis === clippingAxis);
        b.classList.toggle('dark:bg-primary/30', b.dataset.axis === clippingAxis);
        b.classList.toggle('bg-slate-200', b.dataset.axis !== clippingAxis);
        b.classList.toggle('dark:bg-slate-700', b.dataset.axis !== clippingAxis);
      });
      const normals = { x: [1, 0, 0], y: [0, 1, 0], z: [0, 0, 1] };
      clippingPlane.normal.set(...normals[clippingAxis]);
      applyClippingToMeshes();
    });
  });

  if (opacitySlider) {
    opacitySlider.addEventListener('input', () => {
      opacityValue = parseInt(opacitySlider.value, 10) / 100;
      if (opacityValueEl) opacityValueEl.textContent = Math.round(opacityValue * 100) + '%';
      applyOpacity();
    });
  }

  const ghostToggle = document.getElementById('ghost-mode-toggle');
  if (ghostToggle) {
    ghostToggle.addEventListener('change', () => {
      ghostMode = ghostToggle.checked;
      applyOpacity();
      applyClippingToMeshes();
    });
  }

  async function initFromRepository() {
    try {
      const records = await loadFromRepository();
      if (records.length > 0) {
        restoreFromRepository(records);
      }
    } catch (e) {
      console.warn('Could not load from repository:', e);
    }
  }

  initThree();
  document.addEventListener('osiris-theme-change', () => updateSceneBackgroundForTheme());
  let corintisProjectLibraryRefreshTimer = null;
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    clearTimeout(corintisProjectLibraryRefreshTimer);
    corintisProjectLibraryRefreshTimer = setTimeout(() => {
      hydrateProjectLibrary().catch(() => {});
    }, 500);
  });
  initFromRepository()
    .then(async () => {
      renderAnalysisRunsList(true);
      if (window.OSirisPlatformReady) {
        try {
          await window.OSirisPlatformReady;
        } catch (_) {
          /* not logged into platform — library may 403 */
        }
      }
      await hydrateProjectLibrary();
    })
    .catch(() => {});
  hideLoading();
  animate();
})();
  </script>
  <script src="/js/platform-shell-topbar.js"></script>
</body>
