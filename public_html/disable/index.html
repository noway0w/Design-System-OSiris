  <style>
    .corintis-canvas-wrap { position: relative; min-height: 0; }
    #corintis-canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
    .corintis-overlay { pointer-events: none; }
    .corintis-overlay > * { pointer-events: auto; }
    /* Floating panels - glassmorphism */
    .corintis-floating-panel {
      position: fixed;
      width: 16rem;
      max-width: calc(100vw - 2rem);
      border-radius: 0.5rem;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, top 0.25s cubic-bezier(0.4, 0, 0.2, 1), left 0.25s cubic-bezier(0.4, 0, 0.2, 1), right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 40;
    }
    html.dark .corintis-floating-panel,
    .dark .corintis-floating-panel {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .corintis-floating-panel:hover { box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2); }
    html.dark .corintis-floating-panel:hover,
    .dark .corintis-floating-panel:hover { box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6); }
    .corintis-floating-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      cursor: grab;
      user-select: none;
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      min-height: 2.5rem;
      flex-shrink: 0;
      color: #1e293b;
    }
    html.dark .corintis-floating-panel-header,
    .dark .corintis-floating-panel-header {
      background: rgba(30, 41, 59, 0.6);
      border-bottom-color: rgba(255, 255, 255, 0.05);
      color: #f1f5f9;
    }
    .corintis-floating-panel-header:active { cursor: grabbing; }
    .corintis-floating-panel-body {
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
      background: rgba(255, 255, 255, 0.12);
      color: #334155;
    }
    html.dark .corintis-floating-panel-body,
    .dark .corintis-floating-panel-body {
      background: rgba(15, 23, 42, 0.5);
      color: #e2e8f0;
    }
    .corintis-floating-panel .close-btn {
      width: 1.75rem;
      height: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      color: inherit;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .corintis-floating-panel .close-btn:hover { background: rgba(0, 0, 0, 0.06); }
    html.dark .corintis-floating-panel .close-btn:hover,
    .dark .corintis-floating-panel .close-btn:hover { background: rgba(255, 255, 255, 0.08); }
    .corintis-floating-panel[data-panel-id="ai"] {
      width: 460px;
    }
    .corintis-floating-panel[data-panel-id="ai"] .corintis-floating-panel-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      max-height: none !important;
    }
    .corintis-floating-panel[data-panel-id="ai"] .corintis-floating-panel-body > div {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 0;
    }
    .corintis-floating-panel[data-panel-id="loaded"] .corintis-floating-panel-body,
    .corintis-floating-panel[data-panel-id="models"] .corintis-floating-panel-body,
    .corintis-floating-panel[data-panel-id="analysis"] .corintis-floating-panel-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      max-height: none !important;
    }
    .corintis-floating-panel[data-panel-id="loaded"] .corintis-floating-panel-body > div,
    .corintis-floating-panel[data-panel-id="models"] .corintis-floating-panel-body > div,
    .corintis-floating-panel[data-panel-id="analysis"] .corintis-floating-panel-body > div {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 0.75rem;
    }
    /* Elegant discreet scrollbar for panel scrollable areas */
    .corintis-floating-panel ::-webkit-scrollbar { width: 6px; height: 6px; }
    .corintis-floating-panel ::-webkit-scrollbar-track { background: transparent; }
    .corintis-floating-panel ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.3);
      border-radius: 10px;
    }
    .corintis-floating-panel ::-webkit-scrollbar-thumb:hover {
      background: rgba(156, 163, 175, 0.5);
    }
    .corintis-resize-handle { position: absolute; z-index: 5; }
    .corintis-resize-handle-r { right: 0; top: 0; bottom: 0; width: 6px; cursor: ew-resize; }
    .corintis-resize-handle-b { bottom: 0; left: 0; right: 0; height: 6px; cursor: ns-resize; }
    .corintis-resize-handle-l { left: 0; top: 0; bottom: 0; width: 6px; cursor: ew-resize; }
    .corintis-resize-handle-t { top: 0; left: 0; right: 0; height: 6px; cursor: ns-resize; }
    .corintis-resize-handle-br { right: 0; bottom: 0; width: 12px; height: 12px; cursor: nwse-resize; }
    .corintis-sidebar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 0;
      z-index: 30;
      pointer-events: auto;
      background: rgba(248, 250, 252, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
    }
    html.dark .corintis-sidebar,
    .dark .corintis-sidebar {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }
    .corintis-sidebar-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #334155;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .corintis-sidebar-btn:hover {
      background: rgba(0, 0, 0, 0.06);
      color: #1e293b;
    }
    html.dark .corintis-sidebar-btn,
    .dark .corintis-sidebar-btn {
      color: #e2e8f0;
    }
    html.dark .corintis-sidebar-btn:hover,
    .dark .corintis-sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #f1f5f9;
    }
    .corintis-sidebar-btn.corintis-sidebar-btn-active {
      background: rgba(19, 146, 236, 0.15);
      color: #1392ec;
    }
    .corintis-sidebar-btn .material-symbols-outlined { font-size: 24px; }
  </style>

  <script>
    (function() {
      var ICONS = { info: 'info', success: 'check_circle', error: 'delete' };
      window.showToast = function(opts) {
        var type = (opts && opts.type) || 'info';
        var message = (opts && opts.message) || '';
        if (!message) return;
        var container = document.getElementById('toast-container');
        if (!container) {
          container = document.createElement('div');
          container.id = 'toast-container';
          container.setAttribute('aria-live', 'polite');
          container.setAttribute('aria-label', 'Notifications');
          document.body.insertBefore(container, document.body.firstChild);
        }
        var icon = ICONS[type] || ICONS.info;
        var el = document.createElement('div');
        el.className = 'toast toast-' + type;
        el.setAttribute('role', type === 'error' ? 'alert' : 'status');
        el.innerHTML = '<div class="toast-icon-wrapper"><span class="material-symbols-outlined" style="font-size:1.25rem">' + icon + '</span></div><div class="toast-content"><div class="toast-title">' + (type === 'success' ? 'Success' : type === 'error' ? 'Error' : 'Info') + '</div><div class="toast-description">' + message.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') + '</div></div><button type="button" class="toast-close" aria-label="Close"><span class="material-symbols-outlined" style="font-size:1.25rem">close</span></button>';
        var dismiss = function() {
          el.classList.add('toast-exit');
          setTimeout(function() { el.remove(); }, 260);
        };
        el.querySelector('.toast-close').addEventListener('click', dismiss);
        if (type === 'success') setTimeout(dismiss, 3000);
        container.appendChild(el);
      };
    })();
  </script>

  <script>
(function () {
  const canvas = document.getElementById('corintis-canvas');
  const loadingEl = document.getElementById('corintis-loading');

  const floatingPanelsContainer = document.getElementById('corintis-floating-panels');
  const loadingBar = document.getElementById('corintis-loading-bar');
  const loadingStatus = document.querySelector('.corintis-loading-status');

  const PANEL_GAP = 10;
  const PANEL_HEADER_H = 40;
  const PANEL_BODY_MAX_H = 320;
  const PANEL_AI_BODY_MAX_H = 420;
  const PANEL_Z = 40;
  const PANEL_ANCHOR_TOP = 76;
  const PANEL_SIDEBAR_WIDTH = 56;
  const PANEL_ANCHOR_OFFSET = 12 + 56; /* 12 + sidebar width */
  const PANEL_STORAGE_KEY = 'corintis_panel_positions';
  const PANEL_MIN_W = 192; // 12rem
  const PANEL_MAX_W_OFFSET = 32; // 2rem
  const PANEL_MIN_H = 80;
  let corintisPanelAlign = 'left';

  function loadPanelPositions() {
    try {
      const raw = localStorage.getItem(PANEL_STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return typeof parsed === 'object' && parsed !== null ? parsed : null;
    } catch (_) { return null; }
  }

  function savePanelPositions() {
    const panels = Array.from(floatingPanelsContainer?.querySelectorAll('.corintis-floating-panel[data-panel-id]') || []).filter((p) => isPanelOpen(p));
    const positions = {};
    panels.forEach((panel) => {
      const id = panel.getAttribute('data-panel-id');
      if (!id) return;
      const rect = panel.getBoundingClientRect();
      const w = panel.style.width ? parseFloat(panel.style.width) : rect.width;
      const h = panel.offsetHeight;
      positions[id] = { top: rect.top, left: rect.left, width: w, height: h };
    });
    try {
      localStorage.setItem(PANEL_STORAGE_KEY, JSON.stringify(positions));
    } catch (_) {}
  }

  function createFloatingPanel(id, title, icon, bodyHtml) {
    const panel = document.createElement('div');
    panel.className = 'corintis-floating-panel';
    panel.setAttribute('data-panel-id', id);
    panel.style.display = 'none';
    const bodyWrapperClass = id === 'ai' ? 'corintis-ai-body-wrapper' : (id === 'loaded' || id === 'models' || id === 'analysis' ? 'corintis-list-panel-wrapper' : 'p-3');
    const bodyMaxHeight = (id === 'ai' || id === 'loaded' || id === 'models' || id === 'analysis') ? 'none' : PANEL_BODY_MAX_H + 'px';
    panel.innerHTML = `
      <div class="corintis-floating-panel-header">
        <div class="flex items-center gap-2 min-w-0 flex-1">
          <span class="material-symbols-outlined text-lg text-primary flex-shrink-0">${icon}</span>
          <span class="text-sm font-semibold truncate">${title}</span>
        </div>
        <button type="button" class="close-btn flex-shrink-0" aria-label="Close">
          <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
      </div>
      <div class="corintis-floating-panel-body" style="max-height: ${bodyMaxHeight};">
        <div class="${bodyWrapperClass}">${bodyHtml}</div>
      </div>
      <div class="corintis-resize-handle corintis-resize-handle-r" data-edge="r" aria-label="Resize"></div>
      <div class="corintis-resize-handle corintis-resize-handle-b" data-edge="b" aria-label="Resize"></div>
      <div class="corintis-resize-handle corintis-resize-handle-l" data-edge="l" aria-label="Resize"></div>
      <div class="corintis-resize-handle corintis-resize-handle-t" data-edge="t" aria-label="Resize"></div>
      <div class="corintis-resize-handle corintis-resize-handle-br" data-edge="br" aria-label="Resize"></div>
    `;
    const closeBtn = panel.querySelector('.close-btn');
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      setPanelOpen(panel, false);
    });
    return panel;
  }

  function setPanelOpen(panel, open) {
    const id = panel.getAttribute('data-panel-id');
    if (!id) return;
    panel.style.display = open ? 'flex' : 'none';
    const btn = document.querySelector(`.corintis-sidebar-btn[data-panel-id="${id}"]`);
    if (btn) btn.classList.toggle('corintis-sidebar-btn-active', open);
    if (open) requestAnimationFrame(() => layoutCorintisPanels(false));
  }

  function isPanelOpen(panel) {
    return panel.style.display !== 'none';
  }

  function getPanelHeight(panel) {
    const header = panel.querySelector('.corintis-floating-panel-header');
    const headerH = header?.offsetHeight ?? PANEL_HEADER_H;
    const body = panel.querySelector('.corintis-floating-panel-body');
    const bodyInner = body?.querySelector('div');
    const bodyH = bodyInner ? bodyInner.scrollHeight + 24 : 120;
    const maxH = panel.getAttribute('data-panel-id') === 'ai' ? PANEL_AI_BODY_MAX_H : PANEL_BODY_MAX_H;
    return headerH + Math.min(bodyH, maxH);
  }

  function layoutCorintisPanels(forceDefault = false) {
    const allPanels = Array.from(floatingPanelsContainer?.querySelectorAll('.corintis-floating-panel[data-panel-id]') || []);
    const panels = allPanels.filter((p) => isPanelOpen(p));
    const saved = forceDefault ? null : loadPanelPositions();
    const isLeft = corintisPanelAlign === 'left';
    let y = PANEL_ANCHOR_TOP;
    panels.forEach((panel, i) => {
      const id = panel.getAttribute('data-panel-id');
      const pos = saved && id && saved[id];
      if (pos && typeof pos.top === 'number' && typeof pos.left === 'number') {
        panel.style.top = pos.top + 'px';
        panel.style.left = pos.left + 'px';
        panel.style.right = 'auto';
        if (typeof pos.width === 'number' && pos.width >= PANEL_MIN_W) {
          panel.style.width = Math.min(pos.width, window.innerWidth - PANEL_MAX_W_OFFSET) + 'px';
        }
        if (typeof pos.height === 'number' && pos.height >= PANEL_MIN_H) {
          panel.style.height = pos.height + 'px';
        }
      } else {
        const h = getPanelHeight(panel);
        panel.style.top = y + 'px';
        panel.style.transition = 'top 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
        if (isLeft) {
          panel.style.left = PANEL_ANCHOR_OFFSET + 'px';
          panel.style.right = 'auto';
        } else {
          panel.style.right = PANEL_ANCHOR_OFFSET + 'px';
          panel.style.left = 'auto';
        }
        y += h + PANEL_GAP;
      }
      panel.style.zIndex = String(PANEL_Z + i);
    });
  }

  function isPanelOffScreen(panel) {
    const rect = panel.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    return rect.right < 0 || rect.left > vw || rect.bottom < 0 || rect.top > vh;
  }

  function realignPanelsToLeft() {
    corintisPanelAlign = 'left';

    draggablePanels.forEach((panel) => {
      const header = panel.querySelector('.corintis-floating-panel-header');
      if (!header) return;
      const startDrag = (clientX, clientY) => {
        const rect = panel.getBoundingClientRect();
        panel.style.transition = 'none';
        // Remove centering transform if present so absolute positioning works
        if (panel.style.transform) panel.style.transform = 'none';
        // Ensure we set initial position in pixels to match current visual location
        panel.style.left = rect.left + 'px';
        panel.style.top = rect.top + 'px';
        panel.style.right = 'auto'; // Clear right if set (for right-aligned panels)
        
        window._corintisPanelDrag = { panel, startX: clientX, startY: clientY, startLeft: rect.left, startTop: rect.top };
      };
      header.addEventListener('mousedown', (e) => {
        if (e.target.closest('.close-btn')) return;
        startDrag(e.clientX, e.clientY);
      });
      header.addEventListener('touchstart', (e) => {
        if (e.target.closest('.close-btn')) return;
        startDrag(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });
    });

    const moveDrag = (clientX, clientY) => {
      if (!window._corintisPanelDrag) return;
      const { panel, startX, startY, startLeft, startTop } = window._corintisPanelDrag;
      const dx = clientX - startX, dy = clientY - startY;
      panel.style.left = (startLeft + dx) + 'px';
      panel.style.top = (startTop + dy) + 'px';
      panel.style.right = 'auto';
    };

    const endDrag = () => {
      const d = window._corintisPanelDrag;
      window._corintisPanelDrag = null;
      if (!d?.panel) return;
      d.panel.style.transition = '';
      const allPanels = Array.from(floatingPanelsContainer?.querySelectorAll('.corintis-floating-panel[data-panel-id]') || []);
      const anyOffScreen = allPanels.some((p) => isPanelOffScreen(p));
      if (anyOffScreen) {
        realignPanelsToLeft();
      } else {
        savePanelPositions();
      }
    };

    document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchmove', (e) => {
      if (window._corintisPanelDrag) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchend', endDrag);

    function startResize(panel, edge, clientX, clientY) {
      const rect = panel.getBoundingClientRect();
      panel.style.transition = 'none';
      window._corintisPanelResize = {
        panel,
        edge,
        startX: clientX,
        startY: clientY,
        startW: rect.width,
        startH: rect.height,
        startLeft: rect.left,
        startTop: rect.top
      };
    }

    function moveResize(clientX, clientY) {
      const r = window._corintisPanelResize;
      if (!r?.panel) return;
      const { panel, edge, startX, startY, startW, startH, startLeft, startTop } = r;
      const dx = clientX - startX;
      const dy = clientY - startY;
      const maxW = window.innerWidth - PANEL_MAX_W_OFFSET;
      if (edge === 'r' || edge === 'br') {
        const newW = Math.max(PANEL_MIN_W, Math.min(maxW, startW + dx));
        panel.style.width = newW + 'px';
      }
      if (edge === 'l') {
        const newW = Math.max(PANEL_MIN_W, Math.min(maxW, startW - dx));
        panel.style.width = newW + 'px';
        panel.style.left = (startLeft + startW - newW) + 'px';
      }
      if (edge === 'b' || edge === 'br') {
        const newH = Math.max(PANEL_MIN_H, startH + dy);
        panel.style.height = newH + 'px';
      }
      if (edge === 't') {
        const newH = Math.max(PANEL_MIN_H, startH - dy);
        panel.style.height = newH + 'px';
        panel.style.top = (startTop + startH - newH) + 'px';
      }
    }

    function endResize() {
      const r = window._corintisPanelResize;
      window._corintisPanelResize = null;
      if (r?.panel) {
        r.panel.style.transition = '';
        savePanelPositions();
      }
    }

    panels.forEach((panel) => {
      panel.querySelectorAll('.corintis-resize-handle').forEach((handle) => {
        const edge = handle.getAttribute('data-edge');
        const onStart = (x, y) => {
          if (window._corintisPanelDrag) return;
          startResize(panel, edge, x, y);
        };
        handle.addEventListener('mousedown', (e) => { e.preventDefault(); onStart(e.clientX, e.clientY); });
        handle.addEventListener('touchstart', (e) => { onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
      });
    });

    document.addEventListener('mousemove', (e) => {
      if (window._corintisPanelResize) moveResize(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', () => { if (window._corintisPanelResize) endResize(); });
    document.addEventListener('touchmove', (e) => {
      if (window._corintisPanelResize) moveResize(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    document.addEventListener('touchend', () => { if (window._corintisPanelResize) endResize(); });
  }

  // ---- CAD context helper for AI panel ----

  function getCurrentCadContext() {
    const ctx = {
      hasCad: !!cadGroup,
      activeFileId,
      layers: layers.map((l) => ({
        id: l.id,
        name: l.name,
        visible: layerVisibility[l.id] !== false
      })),
      clipping: {
        enabled: clippingEnabled,
        axis: clippingAxis,
        value: clippingValue
      }
    };
    if (camera) {
      ctx.camera = {
        position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
        target: controls && controls.target ? { x: controls.target.x, y: controls.target.y, z: controls.target.z } : null
      };
    }
    return ctx;
  }

  async function sendAiMessage(message) {
    const statusEl = document.getElementById('corintis-ai-status');

    try {
      const res = await fetch('../api/openclaw-chat.php', {

   * Shows a Format Optimization toast when nothing responds successfully.
   */
  async function convertToStepOrGltf(entry) {
    const C = window.CadConversionService;
    const buffer = entry && entry.buffer;
    const name = (entry && entry.name) || 'model';
    if (!buffer) {
      notifyToast('info', 'Format Optimization: No file data to convert. Export as STEP (.stp) and import again.');
      return { ok: false, reason: 'no_buffer' };
    }
    if (!C || typeof C.convert !== 'function') {
      notifyToast('info', 'Format Optimization: CadConversionService not loaded.');
      return { ok: false, reason: 'no_service' };
    }
    notifyToast('info', '3D Solid detected. Optimizing geometry for web rendering...');
    const conv = await C.convert({ name, buffer });
    if (conv.ok) {
      notifyToast('success', 'Conversion file received.');
      return { ok: true };
    }
    notifyToast('info', conv.hint || conv.error || 'Optimization hint: export as STEP (.stp).');
    return { ok: false, reason: conv.code, conv };
  }

    if (routingCodes.indexOf(code) >= 0) {
      showCadConversionRoutingBanner(format, entry);

  function ensureTypedArray(arr, Ctor) {
    if (arr instanceof Ctor) return arr;
    return new Ctor(arr);
  }

  function occtMeshToThree(meshData) {
    const geom = new THREE.BufferGeometry();
    const posArr = ensureTypedArray(meshData.attributes.position.array, Float32Array);
    geom.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
    if (meshData.attributes.normal) {
      const normArr = ensureTypedArray(meshData.attributes.normal.array, Float32Array);
      geom.setAttribute('normal', new THREE.Float32BufferAttribute(normArr, 3));
    }
    if (meshData.index && meshData.index.array) {
      const idxArr = ensureTypedArray(meshData.index.array, Uint32Array);
      geom.setIndex(new THREE.BufferAttribute(idxArr, 1));
    }
    geom.computeVertexNormals();
    return geom;
  }

  function animate() {

  function getClippingConstant() {
    if (!cadBounds) return 0;
    const { min, max } = cadBounds;
    const axisIdx = { x: 0, y: 1, z: 2 }[clippingAxis];
    const lo = [min.x, min.y, min.z][axisIdx];
    const hi = [max.x, max.y, max.z][axisIdx];
    return -hi + clippingValue * (hi - lo);
  }

  function disposeMaterial(material) {
    if (!material) return;
    if (Array.isArray(material)) {
      material.forEach((m) => { if (m && typeof m.dispose === 'function') m.dispose(); });
    } else if (typeof material.dispose === 'function') {
      material.dispose();
    }
  }

  function forEachMaterial(mesh, fn) {
    const m = mesh.material;
    if (!m) return;
    (Array.isArray(m) ? m : [m]).forEach((mat) => { if (mat) fn(mat); });
  }

  function applyClippingToMeshes() {
    const planes = clippingEnabled ? [new THREE.Plane(clippingPlane.normal.clone(), getClippingConstant())] : [];
    cadMeshes.forEach(({ mesh }) => {
      forEachMaterial(mesh, (mat) => { mat.clippingPlanes = planes; });
    });
    if (edgesGroup) {
      const edgePlanes = planes;
      edgesGroup.children.forEach((line) => {
        if (line.material) line.material.clippingPlanes = edgePlanes;
      });
    }
  }

  function applyOpacity() {
    if (ghostMode) {
      const ghostOpacity = Math.max(0.06, Math.min(0.25, (opacityValue / 100) * 0.2));
      cadMeshes.forEach(({ mesh }) => {
        forEachMaterial(mesh, (mat) => {
          mat.transparent = true;
          mat.opacity = ghostOpacity;
          mat.side = THREE.DoubleSide;
          mat.depthWrite = false;
          mat.depthTest = false;
        });
      });
      if (edgesGroup) edgesGroup.visible = true;
    } else {
      const useTransparency = opacityValue < 1;
      cadMeshes.forEach(({ mesh }) => {
        forEachMaterial(mesh, (mat) => {
          mat.transparent = useTransparency;
          mat.opacity = opacityValue;
          mat.side = THREE.DoubleSide;
          mat.depthWrite = opacityValue >= 1;
        });
      });
      if (edgesGroup) edgesGroup.visible = false;
    }
  }

  function removeFlowLines() {
    if (flowLinesGroup) {
      scene.remove(flowLinesGroup);
      flowLinesGroup.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose());
          else obj.material.dispose();
        }
      });
      flowLinesGroup = null;
    }
  }

  async function loadFlowLines(url) {
    removeFlowLines();

    const res = await fetch(url);
    if (!res.ok) throw new Error('Failed to load streamlines');
    const data = await res.json();

    const streamlines = data.streamlines || [];
    if (streamlines.length === 0) return;

    flowLinesGroup = new THREE.Group();
    flowLinesGroup.name = 'flowLines';
    const allVelocities = streamlines.flatMap((s) => s.velocity || []);
    let vMin = Infinity;
    let vMax = -Infinity;
    if (allVelocities.length > 0) {
      for (let i = 0; i < allVelocities.length; i++) {
        if (allVelocities[i] < vMin) vMin = allVelocities[i];
        if (allVelocities[i] > vMax) vMax = allVelocities[i];
      }
    } else {
      vMin = 0;
      vMax = 1;
    }
    const vRange = vMax - vMin || 1;

    streamlines.forEach((line) => {
      const points = (line.points || []).map((p) => new THREE.Vector3(p[0], p[1], p[2]));
      if (points.length < 2) return;
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const colors = new Float32Array(points.length * 3);
      const velocities = line.velocity || [];
      points.forEach((_, i) => {
        const v = velocities[i] ?? 0;
        const t = (v - vMin) / vRange;
        const c = new THREE.Color().setHSL(0.6 - t * 0.6, 1, 0.5);
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      });
      geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const mat = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.9
      });
      const lineObj = new THREE.Line(geom, mat);
      flowLinesGroup.add(lineObj);
    });

    if (cadGroup) {
      flowLinesGroup.position.copy(cadGroup.position);
      flowLinesGroup.quaternion.copy(cadGroup.quaternion);
      flowLinesGroup.scale.setScalar(1000);
    }
    scene.add(flowLinesGroup);
  }

  async function triggerAnalysis() {
    if (!cadGroup || cadGroup.children.length === 0) {
      showError('Load a CAD model first.');
      return;
    }
    showLoading('Running CFD...', 'Checking CFD server...', 2);

    try {
      const healthRes = await fetch(getCfdUrl('/health'), { method: 'GET' });
      if (!healthRes.ok) {
        const h = await healthRes.json().catch(() => ({}));
        throw new Error(h.error || 'CFD server reported an error');
      }
    } catch (e) {
      const isNetwork = e.name === 'TypeError' || e.message === 'Failed to fetch';
      const msg = isNetwork
        ? 'CFD service is not running. Start it: sudo systemctl start cfd-sidecar'
        : (e.message || 'CFD server check failed');
      showError(msg);
      return;
    }

    showLoading('Running CFD...', 'Exporting geometry', 5);

    const clone = cadGroup.clone();
    clone.position.set(0, 0, 0);
    clone.quaternion.identity();
    clone.rotation.set(0, 0, 0);
    clone.scale.multiplyScalar(STL_SCALE_METERS);
    clone.updateMatrixWorld(true);
    const exporter = new THREE.STLExporter();
    const stlData = exporter.parse(clone, { binary: true });
    const stlBuffer = stlData instanceof ArrayBuffer ? stlData : (stlData.buffer || stlData);

    const formData = new FormData();
    formData.append('geometry', new Blob([stlBuffer]), 'geometry.stl');
    formData.append('vx', document.getElementById('cfd-vx').value || 1);
    formData.append('vy', document.getElementById('cfd-vy').value || 0);
    formData.append('vz', document.getElementById('cfd-vz').value || 0);

    try {
      updateLoadingProgress('Running OpenFOAM... (blockMesh → snappyHexMesh → simpleFoam, may take 2–5 min)', 15);
      const res = await fetch(getCfdUrl('/run-cfd'), {
        method: 'POST',
        body: formData
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json.error || res.statusText);
      const { caseId, streamlinesUrl } = json;

      updateLoadingProgress('Loading flow lines', 95);
      await loadFlowLines(getCfdUrl(streamlinesUrl));
      hideLoading();
      const vx = parseFloat(document.getElementById('cfd-vx')?.value) || 1;
      const vy = parseFloat(document.getElementById('cfd-vy')?.value) || 0;
      const vz = parseFloat(document.getElementById('cfd-vz')?.value) || 0;
      saveCfdRun({ caseId, streamlinesUrl, timestamp: Date.now(), vx, vy, vz });
      renderAnalysisRunsList(false);
      notifyToast('success', 'CFD analysis completed and streamlines loaded.');
    } catch (e) {
      const isNetwork = e.name === 'TypeError' || e.message === 'Failed to fetch';
      const msg = isNetwork
        ? 'CFD service is not running. Start it: sudo systemctl start cfd-sidecar'
        : (e.message || 'CFD analysis failed');
      showError(msg);
    }
  }

  function clearCad() {
    removeFlowLines();
    if (edgesGroup) {
      scene.remove(edgesGroup);
      edgesGroup.children.forEach((line) => {
        line.geometry.dispose();
        if (line.material) line.material.dispose();
      });
      edgesGroup = null;
    }
    if (cadGroup) {
      scene.remove(cadGroup);
      cadMeshes.forEach(({ mesh, geometry }) => {
        geometry.dispose();
        disposeMaterial(mesh.material);
      });
      cadMeshes = [];
      cadGroup = null;
    }
    layers = [];
    layerVisibility = {};
  }

  function collectLayersFromNode(node, acc, prefix = '') {
    if (!node) return;
    const name = (node.name && String(node.name).trim()) || 'Unnamed';
    const fullName = prefix ? `${prefix} › ${name}` : name;
    const raw = node.meshes || [];
    const meshIndices = Array.isArray(raw) ? raw.map((i) => Number(i)).filter((i) => !isNaN(i) && i >= 0) : [];
    if (meshIndices.length > 0) {
      acc.push({ id: acc.length, name: fullName, meshIndices });
    }
    const children = node.children || [];
    for (const child of children) {
      collectLayersFromNode(child, acc, fullName);
    }
  }

  function updateLayersPanel() {
    if (!layersList) return;
    layersList.innerHTML = '';
    if (layers.length === 0) {
      layersList.innerHTML = '<p class="text-sm text-slate-500 dark:text-slate-400">No layers</p>';
      return;
    }
    layers.forEach((layer) => {
      const visible = layerVisibility[layer.id] !== false;
      const label = document.createElement('label');
      label.className = 'flex items-center p-4 gap-4 rounded-xl bg-white/10 dark:bg-slate-800/30 backdrop-blur-md border border-white/20 dark:border-slate-600/50 hover:border-white/30 dark:hover:border-slate-500/50 cursor-pointer transition-all active:scale-95 group';
      label.innerHTML = `
        <input type="checkbox" class="corintis-layer-toggle rounded accent-primary" data-layer-id="${layer.id}" ${visible ? 'checked' : ''}/>
        <span class="text-sm text-slate-800 dark:text-slate-200 truncate flex-1" title="${layer.name}">${layer.name}</span>
      `;
      label.querySelector('input').addEventListener('change', (e) => {
        const id = parseInt(e.target.dataset.layerId, 10);
        layerVisibility[id] = e.target.checked;
        const layer = layers.find((l) => l.id === id);
        if (layer) {
          layer.meshIndices.forEach((idx) => {
            if (cadMeshes[idx]?.mesh) cadMeshes[idx].mesh.visible = e.target.checked;
            if (cadMeshes[idx]?.edgesLine) cadMeshes[idx].edgesLine.visible = e.target.checked;
          });
        }
      });
      layersList.appendChild(label);
    });
  }

  function collectMeshesFromObject3D(obj, out) {
    const t = obj.type || '';
    const hasGeom = obj.geometry && (
      obj.isMesh || obj.isLineSegments || obj.isLine || obj.isLineLoop || obj.isPoints
      || t === 'Line' || t === 'LineSegments' || t === 'LineLoop' || t === 'Points' || t === 'Mesh'
    );
    if (hasGeom) out.push({ mesh: obj, geometry: obj.geometry });
    if (obj.children) {
      for (const c of obj.children) collectMeshesFromObject3D(c, out);
    }
  }

  function buildMeshesFromDxfParsed(dxfData) {
    clearCad();
    const positions = [];
    const indices = [];
    let layerMap = {};
    let layerIndex = 0;
    function getLayerId(name) {
      if (!layerMap[name]) layerMap[name] = layerIndex++;
      return layerMap[name];
    }
    function addLineSegments(verts, layer) {
      for (let i = 0; i < verts.length - 1; i++) {
        const a = verts[i], b = verts[i + 1];
        const idx = positions.length / 3;
        positions.push(a.x || 0, a.y || 0, a.z || 0);
        positions.push(b.x || 0, b.y || 0, b.z || 0);
        indices.push(idx, idx + 1);
      }
    }
    function arcPoints(center, radius, startAngle, endAngle, segments) {
      const pts = [];
      for (let i = 0; i <= segments; i++) {
        const a = startAngle + (endAngle - startAngle) * (i / segments);
        pts.push({
          x: center.x + radius * Math.cos(a),
          y: center.y + radius * Math.sin(a),
          z: (center.z || 0)
        });
      }
      return pts;
    }
    function processEntity(e, layer) {
      if (!e) return;
      const l = e.layer || layer || '0';
      if (e.type === 'LINE' && e.vertices && e.vertices.length >= 2) {
        addLineSegments(e.vertices, l);
      } else if (e.type === 'LWPOLYLINE' && e.vertices && e.vertices.length >= 2) {
        const pts = e.vertices.map((v) => ({ x: v.x, y: v.y, z: 0 }));
        addLineSegments(pts, l);
      } else if (e.type === 'POLYLINE' && e.vertices && e.vertices.length >= 2) {
        const pts = e.vertices.map((v) => ({ x: v.x, y: v.y, z: v.z || 0 }));
        addLineSegments(pts, l);
      } else if (e.type === 'CIRCLE' && e.center && e.radius != null) {
        const pts = arcPoints(e.center, e.radius, 0, Math.PI * 2, 32);
        addLineSegments(pts, l);
      } else if (e.type === 'ARC' && e.center && e.radius != null) {
        const toRad = (a) => (typeof a === 'number' && Math.abs(a) > 2 * Math.PI) ? a * Math.PI / 180 : (a ?? 0);
        const start = toRad(e.startAngle);
        const end = e.endAngle != null ? toRad(e.endAngle) : start + Math.PI;
        const pts = arcPoints(e.center, e.radius, start, end, 24);
        addLineSegments(pts, l);
      } else if (e.type === '3DFACE' && e.vertices && e.vertices.length >= 3) {
        const v = e.vertices;
        for (let i = 0; i < v.length - 1; i++) {
          addLineSegments([v[i], v[(i + 1) % v.length]], l);
        }
      }
    }
    const entities = dxfData.entities || [];
    for (const e of entities) processEntity(e);
    const blocks = dxfData.blocks || {};
    for (const key of Object.keys(blocks)) {
      const b = blocks[key];
      if (b && b.entities) for (const e of b.entities) processEntity(e, b.layer);
    }
    if (positions.length === 0) throw new Error('DXF file produced no geometry');
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geom.setIndex(indices);
    geom.computeBoundingSphere();
    const lineMat = new THREE.LineBasicMaterial({ color: 0xd3d3d3, clippingPlanes: [] });
    const lineSeg = new THREE.LineSegments(geom, lineMat);
    lineSeg.renderOrder = 0;
    const collected = [{ mesh: lineSeg, geometry: geom }];
    const layerList = Object.keys(layerMap).map((n) => ({ id: layerMap[n], name: n, meshIndices: [0] }));
    layers = layerList.length > 0 ? layerList : [{ id: 0, name: 'Default', meshIndices: [0] }];
    layers.forEach((l) => { layerVisibility[l.id] = true; });
    cadGroup = new THREE.Group();
    edgesGroup = new THREE.Group();
    cadGroup.add(lineSeg);
    cadMeshes.push({ mesh: lineSeg, geometry: geom, edgesLine: null });
    const box = new THREE.Box3().setFromObject(cadGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    cadGroup.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = maxDim > 0 ? 60 / maxDim : 1;
    cadGroup.scale.setScalar(scale);
    scene.add(cadGroup);
    cadBounds = { min: box.min.clone(), max: box.max.clone() };
    applyClippingToMeshes();
    applyOpacity();
    updateLayersPanel();
    const opacitySlider = document.getElementById('opacity-slider');
    if (opacitySlider) opacitySlider.value = Math.round(opacityValue * 100);
    if (canvas && renderer && camera) {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (w > 0 && h > 0) { camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h); }
    }
    hideLoading();
  }

  function buildMeshesFromObject3DRoot(root) {
    if (!root) throw new Error('Failed to parse geometry');
    clearCad();
    const collected = [];
    collectMeshesFromObject3D(root, collected);
    if (collected.length === 0) throw new Error('File produced no geometry');
    layers = collected.map((_, i) => ({ id: i, name: `Part ${i + 1}`, meshIndices: [i] }));
    layers.forEach((l) => { layerVisibility[l.id] = true; });
    cadGroup = new THREE.Group();
    edgesGroup = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({
      color: 0x9ca3af,
      metalness: 0.3,
      roughness: 0.6,
      side: THREE.DoubleSide,
      clippingPlanes: []
    });
    const lineMat = new THREE.LineBasicMaterial({ color: 0x9ca3af, clippingPlanes: [] });
    for (const { mesh, geometry } of collected) {
      const isLine = mesh.isLineSegments || mesh.isLine || mesh.isLineLoop || mesh.isPoints;
      const useMat = isLine ? lineMat.clone() : mat.clone();
      disposeMaterial(mesh.material);
      mesh.material = useMat;
      mesh.castShadow = !isLine;
      mesh.receiveShadow = !isLine;
      mesh.renderOrder = 0;
      cadGroup.add(mesh);
      let edgesLine = null;
      if (!isLine && geometry) {
        const edgesGeom = new THREE.EdgesGeometry(geometry, 15);
        const edgesMat = new THREE.LineBasicMaterial({
          color: 0x5E778C,
          transparent: true,
          opacity: 1,
          depthTest: true,
          depthWrite: true,
          clippingPlanes: []
        });
        edgesLine = new THREE.LineSegments(edgesGeom, edgesMat);
        edgesLine.renderOrder = 10;
        edgesGroup.add(edgesLine);
      }
      cadMeshes.push({ mesh, geometry, edgesLine });
    }
    const box = new THREE.Box3().setFromObject(cadGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    if (!isFinite(center.x) || !isFinite(center.y) || !isFinite(center.z)) {
      center.set(0, 0, 0);
    }
    cadGroup.position.sub(center);
    edgesGroup.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = isFinite(maxDim) && maxDim > 0 ? 60 / maxDim : 1;
    cadGroup.scale.setScalar(scale);
    edgesGroup.scale.setScalar(scale);
    scene.add(cadGroup);
    scene.add(edgesGroup);
    cadBounds = { min: box.min.clone(), max: box.max.clone() };
    applyClippingToMeshes();
    applyOpacity();
    updateLayersPanel();
    const opacitySlider = document.getElementById('opacity-slider');
    if (opacitySlider) opacitySlider.value = Math.round(opacityValue * 100);
    if (canvas && renderer && camera) {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (w > 0 && h > 0) { camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h); }
    }
    hideLoading();
  }

  function buildMeshesFromIfcModel(result) {
    if (!result?.ifcModel) throw new Error('Failed to parse IFC');
    return buildMeshesFromObject3DRoot(result.ifcModel);
  }

  function buildMeshesFromDxfEntity(result) {
    if (result?.dxfParsed) {
      return buildMeshesFromDxfParsed(result.dxfParsed);
    }
    if (!result || !result.success || !result.entity) {
      throw new Error('Failed to parse DXF');
    }
    clearCad();
    const collected = [];
    collectMeshesFromObject3D(result.entity, collected);
    if (collected.length === 0) {
      throw new Error('DXF file produced no geometry');
    }
    layers = collected.map((_, i) => ({ id: i, name: `Part ${i + 1}`, meshIndices: [i] }));
    layers.forEach((l) => { layerVisibility[l.id] = true; });

    cadGroup = new THREE.Group();
    edgesGroup = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({
      color: 0x9ca3af,
      metalness: 0.3,
      roughness: 0.6,
      side: THREE.DoubleSide,
      clippingPlanes: []
    });
    const lineMat = new THREE.LineBasicMaterial({
      color: 0xd3d3d3,
      clippingPlanes: []
    });
    for (const { mesh, geometry } of collected) {
      const isLine = mesh.isLineSegments;
      const useMat = isLine ? lineMat.clone() : mat.clone();
      disposeMaterial(mesh.material);
      mesh.material = useMat;
      mesh.castShadow = !isLine;
      mesh.receiveShadow = !isLine;
      mesh.renderOrder = 0;
      cadGroup.add(mesh);
      let edgesLine = null;
      if (!isLine && geometry) {
        const edgesGeom = new THREE.EdgesGeometry(geometry, 15);
        const edgesMat = new THREE.LineBasicMaterial({
          color: 0x5E778C,
          transparent: true,
          opacity: 1,
          depthTest: true,
          depthWrite: true,
          clippingPlanes: []
        });
        edgesLine = new THREE.LineSegments(edgesGeom, edgesMat);
        edgesLine.renderOrder = 10;
        edgesGroup.add(edgesLine);
      }
      cadMeshes.push({ mesh, geometry, edgesLine });
    }
    const box = new THREE.Box3().setFromObject(cadGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    cadGroup.position.sub(center);
    if (edgesGroup.children.length > 0) {
      edgesGroup.position.sub(center);
    }
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = maxDim > 0 ? 60 / maxDim : 1;
    cadGroup.scale.setScalar(scale);
    if (edgesGroup.children.length > 0) edgesGroup.scale.setScalar(scale);

    scene.add(cadGroup);
    if (edgesGroup.children.length > 0) scene.add(edgesGroup);
    const bbox = new THREE.Box3().setFromObject(cadGroup);
    cadBounds = { min: bbox.min.clone(), max: bbox.max.clone() };

    applyClippingToMeshes();
    applyOpacity();
    updateLayersPanel();
    const opacitySlider = document.getElementById('opacity-slider');
    if (opacitySlider) opacitySlider.value = Math.round(opacityValue * 100);
    if (canvas && renderer && camera) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      if (w > 0 && h > 0) {
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
    }
    hideLoading();
  }

  function buildMeshesFromResult(result, formatHint) {
    const fmt = formatHint || '';
    if (result?.entity) return buildMeshesFromDxfEntity(result);
    if (result?.dxfParsed) return buildMeshesFromDxfParsed(result.dxfParsed);
    if (result?.ifcModel) return buildMeshesFromIfcModel(result);
    /**
     * 3DM/DWG/GLB must always use threeRoot from the current parse. Otherwise a leftover non-empty
     * `result.meshes` array from a previously viewed STEP/IGES file can win and the canvas shows nothing.
     */
    if ((fmt === '3dm' || fmt === 'dwg' || fmt === 'glb') && result?.threeRoot) {
      return buildMeshesFromObject3DRoot(result.threeRoot);
    }
    /** OCCT (STEP/IGES): prefer tessellated meshes when present. */
    const hasOcctMeshes = !!(result && result.meshes && result.meshes.length > 0 && result.success !== false);
    if (!hasOcctMeshes) {
      if (result?.threeRoot) return buildMeshesFromObject3DRoot(result.threeRoot);
      const hint = result && result.success === false
        ? ' The file may use STEP features not supported by the viewer.'
        : '';
      throw new Error('Failed to parse CAD file.' + hint);
    }

    clearCad();

    layers = [];
    if (result.root) {
      collectLayersFromNode(result.root, layers);
    }
    if (layers.length === 0 && result.meshes.length > 0) {
      layers = result.meshes.map((m, i) => ({
        id: i,
        name: (m.name && String(m.name).trim()) || `Part ${i + 1}`,
        meshIndices: [i]
      }));
    }
    layers.forEach((l) => { layerVisibility[l.id] = true; });

    cadGroup = new THREE.Group();
    edgesGroup = new THREE.Group();
    for (const m of result.meshes) {
      const geom = occtMeshToThree(m);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x9ca3af,
        metalness: 0.3,
        roughness: 0.6,
        side: THREE.DoubleSide,
        clippingPlanes: []
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.renderOrder = 0;
      cadGroup.add(mesh);
      cadMeshes.push({ mesh, geometry: geom, edgesLine: null });

      const edgesGeom = new THREE.EdgesGeometry(geom, 15);
      const edgesMat = new THREE.LineBasicMaterial({
        color: 0x5E778C,
        transparent: true,
        opacity: 1,
        depthTest: true,
        depthWrite: true,
        clippingPlanes: []
      });
      const edgesLine = new THREE.LineSegments(edgesGeom, edgesMat);
      edgesLine.renderOrder = 10;
      edgesGroup.add(edgesLine);
      cadMeshes[cadMeshes.length - 1].edgesLine = edgesLine;
    }

    const box = new THREE.Box3().setFromObject(cadGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    if (!isFinite(center.x) || !isFinite(center.y) || !isFinite(center.z)) {
      center.set(0, 0, 0);
    }
    cadGroup.position.sub(center);
    edgesGroup.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = isFinite(maxDim) && maxDim > 0 ? 60 / maxDim : 1;
    cadGroup.scale.setScalar(scale);
    edgesGroup.scale.setScalar(scale);

    scene.add(cadGroup);
    scene.add(edgesGroup);
    const bbox = new THREE.Box3().setFromObject(cadGroup);
    cadBounds = { min: bbox.min.clone(), max: bbox.max.clone() };

    applyClippingToMeshes();
    applyOpacity();

    updateLayersPanel();
    if (layers.length > 0) {
      const opacitySlider = document.getElementById('opacity-slider');
      if (opacitySlider) opacitySlider.value = Math.round(opacityValue * 100);
    }

    if (canvas && renderer && camera) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      if (w > 0 && h > 0) {
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
    }

    hideLoading();
  }

  const OCTT_CDN = 'https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist';
  const DB_NAME = 'corintis-cad-repository';
  const DB_VERSION = 1;
  const STORE_NAME = 'files';

  function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onerror = () => reject(req.error);
      req.onsuccess = () => resolve(req.result);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
    });
  }

  async function saveToRepository(entry) {
    if (entry && entry.fromPlatform) return;
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const record = {
        id: entry.id,
        name: entry.name,
        format: entry.format,
        buffer: entry.buffer,
        result: (['dxf', 'ifc', '3dm', 'dwg', 'glb'].includes(entry.format || detectFormat(entry.name))) ? null : entry.result,
        createdAt: entry.createdAt || Date.now()
      };
      const req = store.put(record);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function parseIfNeeded(entry) {
    const fmtEarly = entry.format || detectFormat(entry.name);
    const reparseFromBuffer = ['dxf', 'ifc', '3dm', 'dwg', 'glb'].includes(fmtEarly);
    if (entry.result && !(entry.result?.entity) && !reparseFromBuffer) {
      let hasGeom = false;
      if (fmtEarly === 'step' || fmtEarly === 'iges' || fmtEarly === 'stp') {
        hasGeom = !!(entry.result.meshes && entry.result.meshes.length > 0);
      } else if (fmtEarly === 'ifc') {
        hasGeom = !!entry.result.ifcModel;
      } else {
        hasGeom = !!(entry.result.meshes && entry.result.meshes.length > 0) || !!entry.result.threeRoot || !!entry.result.ifcModel;
      }
      if (hasGeom) return entry.result;
    }
    if (!entry.buffer) throw new Error('No data to parse');
    const format = entry.format || detectFormat(entry.name);
    showLoading('Loading from repository…', 'Parsing geometry…', 50);
    try {
      const buf = entry.buffer.slice(0);
      if (format === '3dm' || format === 'dwg') {
        const ctx = {
          name: entry.name,
          buffer: buf,
          format,
          entry,
          _cadConversionAttempted: false
        };
        const mw = await parseCadWithConversionMiddleware(ctx, parseCadBufferForEntry);
        entry.buffer = mw.buffer;
        entry.name = mw.name;
        entry.format = mw.format;
        const noCache = ['dxf', 'ifc', '3dm', 'dwg', 'glb'].includes(mw.format);
        entry.result = noCache ? null : (mw.result?.entity ? null : mw.result);
        entry.conversionNeeded = false;
        try {
          await saveToRepository(entry);
        } catch (e) {
          console.warn('Could not update repository:', e);
        }
        return mw.result;
      }
      const result = format === 'dxf' ? await parseDxf(buf)
        : format === 'ifc' ? await parseIfc(buf)
        : format === 'glb' ? await parseGltf(buf)
        : await parseOcctInWorker(buf, format);
      const noCache = ['dxf', 'ifc', '3dm', 'dwg', 'glb'].includes(format);
      entry.result = noCache ? null : (result?.entity ? null : result);
      entry.format = format;
      entry.conversionNeeded = false;
      try {
        await saveToRepository(entry);
      } catch (e) {
        console.warn('Could not update repository:', e);
      }
      return result;
    } finally {
      hideLoading();
    }
  }

  function detectFormat(name) {
    const ext = (name || '').toLowerCase().split('.').pop();
    if (['stp', 'step'].includes(ext)) return 'step';
    if (['dxf'].includes(ext)) return 'dxf';
    if (['ifc'].includes(ext)) return 'ifc';
    if (['3dm'].includes(ext)) return '3dm';
    if (['dwg'].includes(ext)) return 'dwg';
    if (['glb'].includes(ext)) return 'glb';
    return 'iges';
  }

  const THREE_GLTF_CDN = 'https://cdn.jsdelivr.net/npm/three@0.147.0';

  function normalizeCadArrayBuffer(buffer) {
    if (!buffer) return null;
    if (buffer instanceof ArrayBuffer) return buffer;
    if (buffer.buffer && typeof buffer.byteLength === 'number') {
      return buffer.buffer.slice(buffer.byteOffset, buffer.byteOffset + buffer.byteLength);
    }
    return null;
  }

  async function parseGltf(buffer) {
    const ab = normalizeCadArrayBuffer(buffer);
    if (!ab) throw new Error('Invalid GLB buffer');
    const [{ GLTFLoader }, { DRACOLoader }] = await Promise.all([
      import(`${THREE_GLTF_CDN}/examples/jsm/loaders/GLTFLoader.js`),
      import(`${THREE_GLTF_CDN}/examples/jsm/loaders/DRACOLoader.js`)
    ]);
    const loader = new GLTFLoader();
    const draco = new DRACOLoader();
    draco.setDecoderPath(`${THREE_GLTF_CDN}/examples/js/libs/draco/`);
    loader.setDRACOLoader(draco);
    return new Promise((resolve, reject) => {
      loader.parse(
        ab,
        '',
        (gltf) => {
          try { draco.dispose(); } catch (_) {}
          if (!gltf || !gltf.scene) {
            reject(new Error('GLB produced no scene'));
            return;
          }
          resolve({ success: true, threeRoot: gltf.scene });
        },
        (err) => {
          try { draco.dispose(); } catch (_) {}
          reject(err || new Error('Failed to parse GLB'));
        }
      );
    });
  }

  async function parseCadBufferForEntry(buffer, format) {
    if (format === 'dxf') return parseDxf(buffer);
    if (format === 'ifc') return parseIfc(buffer);
    if (format === '3dm') return parse3dm(buffer);
    if (format === 'dwg') return parseDwg(buffer);
    if (format === 'glb') return parseGltf(buffer);
    return parseOcctInWorker(buffer, format);
  }

  /**
   * Middleware: parse DWG/3DM; on solid-only / zero-mesh results, POST to CadConversionService then re-parse (e.g. STEP).
   */
  async function parseCadWithConversionMiddleware(ctx, parseFn) {
    const C = window.CadConversionService;
    let buf = ctx.buffer instanceof ArrayBuffer
      ? ctx.buffer
      : ctx.buffer.buffer.slice(ctx.buffer.byteOffset, ctx.buffer.byteOffset + ctx.buffer.byteLength);
    let name = ctx.name;
    let fmt = ctx.format;
    let result = null;
    let err = null;

    async function doParse() {
      err = null;
      result = null;
      try {
        result = await parseFn(buf, fmt);
      } catch (e) {
        err = e;
      }
    }

    function needsCadConversion() {
      if (ctx._cadConversionAttempted) return false;
      if (fmt !== '3dm' && fmt !== 'dwg') return false;
      if (err) {
        return err.code === 'NO_MESHES_IN_3DM' || err.code === 'DWG_NO_DRAWABLE_MESHES';
      }
      if (fmt === '3dm' && result && result.meshCount === 0) return true;
      if (result && countRenderableMeshesInObject3D(result.threeRoot) === 0) return true;
      return false;
    }

    await doParse();

    if (needsCadConversion() && C && typeof C.canConvert === 'function' && C.canConvert({ name })) {
      ctx._cadConversionAttempted = true;
      notifyToast('info', '3D Solid detected. Optimizing geometry for web rendering...');
      updateLoadingProgress('Optimizing geometry for web…', 72);
      const conv = await C.convert({ name, buffer: buf });
      if (!conv.ok) {
        notifyToast('info', conv.hint || conv.error || 'Optimization hint: export as STEP (.stp) for reliable rendering.');
        if (err) throw err;
        const e = new Error(conv.hint || 'Conversion unavailable');
        e.code = 'CAD_CONVERSION_NEEDED';
        throw e;
      }
      buf = conv.arrayBuffer;
      name = conv.newName || name;
      fmt = detectFormat(name);
      await doParse();
    }

    if (err) throw err;
    assertCadHasRenderableMeshesOrThrow(fmt, result, ctx.entry || null);
    return { result, buffer: buf, name, format: fmt };
  }

  async function loadFromRepository() {
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async function removeFromRepository(id) {
    if (String(id).startsWith('plat-')) return;
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const key = typeof id === 'number' ? id : (Number(id) || id);
      const req = store.delete(key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteFromServer(id) {
    if (String(id).startsWith('plat-')) return;
    const url = typeof getCadFilesUrl === 'function' ? getCadFilesUrl() : '../api/cad-files.php';
    const res = await fetch(url + '?id=' + encodeURIComponent(String(id)), { method: 'DELETE' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Server delete failed');
    }
  }

  async function uploadToServer(entry) {
    if (entry && entry.fromPlatform) return;
    const url = typeof getCadFilesUrl === 'function' ? getCadFilesUrl() : '../api/cad-files.php';
    const form = new FormData();
    form.append('id', String(entry.id));
    form.append('name', entry.name);
    form.append('format', entry.format || detectFormat(entry.name));
    form.append('file', new Blob([entry.buffer]), entry.name);
    const res = await fetch(url, { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Server upload failed');
    }
  }

  async function runPreScanWithProgress(buffer, onProgress) {
    const text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
    const lines = text.split(/\r?\n/);
    let projectName = 'Unknown Project';
    let lastMarker = '';
    const stepStatus = {
      S: (name) => `Reading Prologue: [${name}]...`,
      G: () => 'Extracting Metadata (Units, Author, Environment)...',
      D: () => 'Indexing Geometric Entities (Lines, Surfaces, NURBS)...',
      P: () => 'Calculating Coordinate Geometry and Parameters...',
      T: () => 'Verifying Data Integrity... Success.'
    };

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (line.length >= 73) {
        const marker = line.charAt(72);
        if (marker === 'S' && !projectName) {
          const content = line.slice(0, 72).trim();
          if (content) projectName = content.replace(/\s+/g, ' ').slice(0, 50);
        }
        if (stepStatus[marker] && marker !== lastMarker) {
          lastMarker = marker;
          const status = marker === 'S' ? stepStatus.S(projectName) : stepStatus[marker]();
          const progress = Math.min(20 * (Object.keys(stepStatus).indexOf(marker) + 1), 90);
          onProgress(status, progress);
          await new Promise((r) => setTimeout(r, 50));
        }
      }
      if (i % 1000 === 0 || i === lines.length - 1) {
        const progress = Math.min(90, ((i + 1) / lines.length) * 80);
        const m = lastMarker || 'S';
        onProgress(m === 'S' ? stepStatus.S(projectName) : stepStatus[m](), progress);
        await new Promise((r) => setTimeout(r, 0));
      }
    }

    onProgress('Verifying Data Integrity... Success.', 100);
    return projectName;
  }

  function parseOcctInWorker(buffer, format, paramsOverride) {
    const workerScript = `
      importScripts('${OCTT_CDN}/occt-import-js.js');
      onmessage = async function (ev) {
        try {
          const modulOverrides = {
            locateFile: function (path) { return '${OCTT_CDN}/' + path; }
          };
          const occt = await occtimportjs(modulOverrides);
          const uint8 = new Uint8Array(ev.data.buffer);
          const result = occt.ReadFile(ev.data.format, uint8, ev.data.params);
          postMessage({ ok: true, result });
        } catch (e) {
          postMessage({ ok: false, error: e.message || String(e) });
        }
      };
    `;
    const blob = new Blob([workerScript], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);
    const params = paramsOverride != null ? paramsOverride
      : (format === 'step' || format === 'stp')
        ? { linearDeflection: 0.1, angularDeflection: 0.5 }
        : null;
    return new Promise((resolve, reject) => {
      const worker = new Worker(workerUrl);
      worker.onmessage = (ev) => {
        URL.revokeObjectURL(workerUrl);
        worker.terminate();
        const msg = ev.data;
        if (msg.ok) {
          resolve(msg.result);
        } else {
          reject(new Error(msg.error || 'Worker parsing failed'));
        }
      };
      worker.onerror = (err) => {
        URL.revokeObjectURL(workerUrl);
        worker.terminate();
        reject(new Error(err.message || 'Worker failed'));
      };
      worker.postMessage({ format: format || 'iges', buffer, params }, [buffer]);
    });
  }

  async function parseDxf(buffer) {
    const text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
    if (!text || text.length < 10) {
      throw new Error('DXF file is empty or binary (binary DXF not supported)');
    }
    try {
      const mod = await import('https://esm.sh/dxf-parser@1.1.2');
      let dxf;
      if (typeof mod.default === 'function') {
        dxf = mod.default(text);
      } else if (mod.DxfParser) {
        const parser = new mod.DxfParser();
        dxf = parser.parseSync ? parser.parseSync(text) : parser.parse(text);
      } else {
        throw new Error('DXF parser: unexpected module format');
      }
      const hasEntities = dxf.entities && dxf.entities.length > 0;
      const hasBlocks = dxf.blocks && Object.keys(dxf.blocks).length > 0;
      if (!dxf || (!hasEntities && !hasBlocks)) {
        throw new Error('DXF file produced no geometry');
      }
      return { success: true, dxfParsed: dxf };
    } catch (e) {
      try {
        const { DXFLoader } = await import('https://cdn.jsdelivr.net/npm/three-dxf-loader@5.2.0/dist/three-dxf-loader.js');
        return new Promise((resolve, reject) => {
          const blob = new Blob([buffer], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          const loader = new DXFLoader();
          loader.setEnableLayer(true);
          loader.setConsumeUnits(true);
          loader.setDefaultColor(0xd3d3d3);
          loader.load(
            url,
            (data) => {
              URL.revokeObjectURL(url);
              if (data?.entity) {
                const collected = [];
                collectMeshesFromObject3D(data.entity, collected);
                if (collected.length > 0) {
                  resolve({ success: true, entity: data.entity });
                } else {
                  reject(new Error('DXF file produced no geometry'));
                }
              } else {
                reject(new Error('DXF file produced no geometry'));
              }
            },
            () => {},
            (err) => {
              URL.revokeObjectURL(url);
              reject(new Error(err?.message || 'Failed to parse DXF'));
            }
          );
        });
      } catch (e2) {
        throw new Error(e?.message || e2?.message || 'Failed to parse DXF');
      }
    }
  }

  /** Same-origin base for WASM (avoids CDN/CORS/CSP issues with cross-origin .wasm). */
  function getCadWasmBaseUrl() {
    const base = window.location.pathname.replace(/\/[^/]*$/, '') || '/disable';
    return window.location.origin + base + '/wasm/';
  }

  async function parseIfc(buffer) {
    let mod;
    try {
      mod = await import('https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.126/IFCLoader.js');
    } catch (e) {
      mod = await import('https://esm.sh/web-ifc-three@0.0.126');
    }
    const IFCLoader = mod.IFCLoader || mod.default;
    if (!IFCLoader) throw new Error('IFC loader not found');
    const loader = new IFCLoader();
    if (loader.ifcManager && loader.ifcManager.setWasmPath) {
      loader.ifcManager.setWasmPath(getCadWasmBaseUrl());
    }
    const model = await loader.parse(buffer);
    if (!model) throw new Error('IFC file produced no geometry');
    return { success: true, ifcModel: model };
  }

  const RHINO3DM_CDN = 'https://cdn.jsdelivr.net/npm/rhino3dm@8.17.0';
  const LIBREDWG_CDN = 'https://cdn.jsdelivr.net/npm/@mlightcad/libredwg-web@0.6.6';

  function bufferGeometryFromThreeJson(json) {
    const data = json.data || json;
    const geometry = new THREE.BufferGeometry();
    if (data.attributes) {
      for (const key of Object.keys(data.attributes)) {
        const attr = data.attributes[key];
        const arr = attr.array;
        const itemSize = attr.itemSize || 3;
        const normalized = !!attr.normalized;
        const Ctor = arr.constructor && arr.constructor !== Array ? arr.constructor : Float32Array;
        const buffer = new Ctor(arr);
        geometry.setAttribute(key, new THREE.BufferAttribute(buffer, itemSize, normalized));
      }
    }
    if (data.index) {
      const ia = data.index.array;
      const I = ia.length > 65535 ? Uint32Array : Uint16Array;
      geometry.setIndex(new THREE.BufferAttribute(new I(ia), 1));
    }
    if (data.groups && data.groups.length) {
      for (const g of data.groups) {
        geometry.addGroup(g.start, g.count, g.materialIndex || 0);
      }
    }
    return geometry;
  }

  /** Build THREE.Mesh from Rhino mesh when toThreejsJSON is empty or throws (common on dense meshes). */
  function rhinoMeshToThreeMeshManual(rm) {
    if (!rm || typeof rm.vertices !== 'function' || typeof rm.faces !== 'function') return null;
    try {
      const verts = rm.vertices();
      const faces = rm.faces();
      if (!verts || !faces) return null;
      const vc = verts.count | 0;
      const fc = faces.count | 0;
      if (vc < 3 || fc < 1) return null;
      const positions = new Float32Array(vc * 3);
      for (let i = 0; i < vc; i++) {
        const p = verts.get(i);
        if (!p || p.length < 3) continue;
        positions[i * 3] = Number(p[0]) || 0;
        positions[i * 3 + 1] = Number(p[1]) || 0;
        positions[i * 3 + 2] = Number(p[2]) || 0;
      }
      const indices = [];
      for (let fi = 0; fi < fc; fi++) {
        const f = faces.get(fi);
        if (!f || !f.length) continue;
        if (f.length === 4) {
          indices.push(f[0], f[1], f[2], f[0], f[2], f[3]);
        } else if (f.length === 3) {
          indices.push(f[0], f[1], f[2]);
        }
      }
      if (indices.length === 0) return null;
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const I = indices.length > 65535 ? Uint32Array : Uint16Array;
      geom.setIndex(new THREE.BufferAttribute(new I(indices), 1));
      geom.computeVertexNormals();
      return new THREE.Mesh(geom);
    } catch (_) {
      return null;
    }
  }

  function rhinoMeshToThreeMesh(rhinoMesh) {
    if (!rhinoMesh || typeof rhinoMesh.toThreejsJSON !== 'function') {
      return rhinoMeshToThreeMeshManual(rhinoMesh);
    }
    const tryJson = (arg) => {
      let tj;
      try {
        tj = arg === undefined ? rhinoMesh.toThreejsJSON() : rhinoMesh.toThreejsJSON(arg);
      } catch (_) {
        tj = rhinoMesh.toThreejsJSON();
      }
      const geom = bufferGeometryFromThreeJson(tj);
      const pos = geom.attributes && geom.attributes.position;
      if (pos && pos.count > 0) return new THREE.Mesh(geom);
      return null;
    };
    try {
      const m = tryJson(undefined);
      if (m) return m;
    } catch (_) {}
    try {
      const m = tryJson(false);
      if (m) return m;
    } catch (_) {}
    try {
      const m = tryJson(true);
      if (m) return m;
    } catch (_) {}
    return rhinoMeshToThreeMeshManual(rhinoMesh);
  }

  function rhinoArrayLikeToArray(obj) {
    if (!obj) return [];
    if (Array.isArray(obj)) return obj;
    if (typeof obj.length === 'number') {
      const out = [];
      for (let i = 0; i < obj.length; i++) out.push(obj[i]);
      return out;
    }
    return [];
  }

  function rhinoCoerceGuidish(v) {
    if (v == null) return '';
    if (typeof v === 'string' || typeof v === 'number') return String(v).trim();
    if (typeof v === 'object') {
      if (v.value != null) return String(v.value).trim();
      if (v.guid != null) return String(v.guid).trim();
      if (v.string != null) return String(v.string).trim();
      if (v.id != null) return String(v.id).trim();
    }
    return String(v).trim();
  }

  /** Block instance object IDs are sometimes wrapped objects in WASM builds. */
  function rhinoNormalizeIdefObjectIds(raw) {
    const arr = rhinoArrayLikeToArray(raw);
    const out = [];
    for (const x of arr) {
      if (x == null) continue;
      if (typeof x === 'string' || typeof x === 'number') {
        const s = String(x).trim();
        if (s) out.push(s);
        continue;
      }
      if (typeof x === 'object') {
        const s =
          rhinoCoerceGuidish(x.id) ||
          rhinoCoerceGuidish(x.objectId) ||
          rhinoCoerceGuidish(x.object_id) ||
          rhinoCoerceGuidish(x);
        if (s) out.push(s);
      }
    }
    return out;
  }

  function rhinoExtractInstanceIdefId(ir) {
    if (!ir) return '';
    const direct = [
      ir.parentIdefId,
      ir.parentIdefID,
      ir.parent_idef_id,
      ir.instanceDefinitionId,
      ir.InstanceDefinitionId,
      ir.parentIdef,
      ir.idef_id,
      ir.idefId,
      ir.m_idef_id
    ];
    for (const c of direct) {
      const s = rhinoCoerceGuidish(c);
      if (s) return s;
    }
    try {
      for (const k of Object.keys(ir)) {
        if (/idef|instance.*def|definition.*id/i.test(k) && ir[k] != null) {
          const s = rhinoCoerceGuidish(ir[k]);
          if (s && s.length >= 8) return s;
        }
      }
    } catch (_) {}
    return '';
  }

  /** OpenNURBS Transform → Three.js (column-major), same convention as RhinoCommon. */
  function rhinoTransformToMatrix4(tf) {
    if (!tf) return new THREE.Matrix4();
    return new THREE.Matrix4().set(
      tf.m00, tf.m10, tf.m20, tf.m30,
      tf.m01, tf.m11, tf.m21, tf.m31,
      tf.m02, tf.m12, tf.m22, tf.m32,
      tf.m03, tf.m13, tf.m23, tf.m33
    );
  }

  /** WASM builds use numeric ObjectType; compare with both enum and literals. */
  const RHINO_OT_NUM = {
    Point: 1,
    Curve: 3,
    Surface: 4,
    Brep: 5,
    Mesh: 6,
    Extrusion: 27,
    InstanceReference: 10,
    /** 13 = Detail in Rhino enum; PointCloud is not in WASM ObjectType — detect via instanceof / getPoints */
    SubD: 16
  };

  /** Normalize Rhino GUID / id strings for map lookups (brace and case variants). */
  function rhinoNormalizeId(id) {
    if (id == null) return '';
    return String(id).replace(/[{}]/g, '').replace(/\s+/g, '').toLowerCase();
  }

  /** Compare UUIDs regardless of dash placement (Rhino sometimes omits or varies). */
  function rhinoNormalizeIdHex(id) {
    const s = rhinoNormalizeId(id);
    return s.replace(/-/g, '');
  }

  function rhinoIdsMatch(a, b) {
    if (a == null || b == null) return false;
    const na = rhinoNormalizeId(a);
    const nb = rhinoNormalizeId(b);
    if (na === nb) return true;
    const ha = rhinoNormalizeIdHex(a);
    const hb = rhinoNormalizeIdHex(b);
    if (ha.length >= 16 && hb.length >= 16 && ha === hb) return true;
    return false;
  }

  function rhinoGeomIs(geo, OT, name) {
    const v = geo.objectType;
    if (typeof v === 'string') {
      return v === name || String(v).toLowerCase() === String(name).toLowerCase();
    }
    const ev = OT && OT[name];
    if (ev !== undefined && v === ev) return true;
    return v === RHINO_OT_NUM[name];
  }

  /** True if geometry matches type by enum or numeric WASM code. */
  function rhinoGeomMatches(geo, OT, name) {
    if (!geo) return false;
    return rhinoGeomIs(geo, OT, name) || (RHINO_OT_NUM[name] !== undefined && geo.objectType === RHINO_OT_NUM[name]);
  }

  function rhinoFindInstanceDefinition(doc, parentIdefId) {
    if (!parentIdefId) return null;
    const idefTable = doc.instanceDefinitions();
    if (!idefTable) return null;
    if (typeof idefTable.findId === 'function') {
      const byId = idefTable.findId(parentIdefId);
      if (byId) return byId;
      const hex = rhinoNormalizeIdHex(parentIdefId);
      if (hex.length === 32) {
        const dashed =
          hex.slice(0, 8) +
          '-' +
          hex.slice(8, 12) +
          '-' +
          hex.slice(12, 16) +
          '-' +
          hex.slice(16, 20) +
          '-' +
          hex.slice(20, 32);
        const d2 = idefTable.findId('{' + dashed + '}') || idefTable.findId(dashed);
        if (d2) return d2;
      }
    }
    for (let j = 0; j < idefTable.count; j++) {
      const d = idefTable.get(j);
      if (d && d.id && rhinoIdsMatch(d.id, parentIdefId)) return d;
    }
    return null;
  }

  function rhinoFindFile3dmObjectById(doc, objectId) {
    if (!objectId) return null;
    const tbl = doc.objects();
    if (!tbl) return null;
    if (typeof tbl.findId === 'function') {
      const o = tbl.findId(objectId);
      if (o) return o;
      const hex = rhinoNormalizeIdHex(objectId);
      if (hex.length === 32) {
        const dashed =
          hex.slice(0, 8) +
          '-' +
          hex.slice(8, 12) +
          '-' +
          hex.slice(12, 16) +
          '-' +
          hex.slice(16, 20) +
          '-' +
          hex.slice(20, 32);
        const o2 = tbl.findId('{' + dashed + '}') || tbl.findId(dashed);
        if (o2) return o2;
      }
    }
    for (let i = 0; i < tbl.count; i++) {
      const o = tbl.get(i);
      if (!o) continue;
      const attr = o.attributes();
      if (attr && attr.id && rhinoIdsMatch(attr.id, objectId)) return o;
    }
    return null;
  }

  /** @returns {number} Count of Rhino mesh objects appended to `out` (tessellation candidates). */
  function pushRhinoMeshesFromGeometry(geo, rhino, OT, MT, out) {
    if (!geo) return 0;
    const before = out.length;
    if (rhinoGeomMatches(geo, OT, 'Mesh')) {
      out.push(geo);
      return out.length - before;
    }
    if ((rhinoGeomMatches(geo, OT, 'Extrusion') || (rhino.Extrusion && geo instanceof rhino.Extrusion)) && typeof geo.getMesh === 'function') {
      let gotMesh = false;
      try {
        if (MT.Any != null) {
          try {
            const mAny = geo.getMesh(MT.Any);
            if (mAny) {
              out.push(mAny);
              gotMesh = true;
            }
          } catch (_) {}
        }
        if (!gotMesh) {
          const tryExtrusionTypes = [MT.Render, MT.Preview, MT.Default, MT.Analysis].filter((x) => x != null);
          for (const mt of tryExtrusionTypes) {
            try {
              const m = geo.getMesh(mt);
              if (m) {
                out.push(m);
                gotMesh = true;
                break;
              }
            } catch (_) {}
          }
        }
      } catch (_) {}
      if (!gotMesh && rhino.Brep && typeof rhino.Brep.tryConvertBrep === 'function') {
        try {
          const brep = rhino.Brep.tryConvertBrep(geo);
          if (brep) pushRhinoMeshesFromGeometry(brep, rhino, OT, MT, out);
        } catch (_) {}
      }
      return out.length - before;
    }
    if (rhinoGeomMatches(geo, OT, 'Brep') && typeof geo.faces === 'function') {
      try {
        const faces = geo.faces();
        const n = faces.count;
        const brepFaceMeshPriority = [MT.Render, MT.Preview, MT.Any, MT.Default, MT.Analysis].filter((x) => x != null);
        for (let fi = 0; fi < n; fi++) {
          const face = faces.get(fi);
          if (!face || typeof face.getMesh !== 'function') continue;
          let m = null;
          for (const mt of brepFaceMeshPriority) {
            try {
              m = face.getMesh(mt);
            } catch (_) {
              m = null;
            }
            if (m) break;
          }
          if (m) out.push(m);
        }
      } catch (_) {}
      return out.length - before;
    }
    if (rhinoGeomMatches(geo, OT, 'SubD') && rhino.Mesh && typeof rhino.Mesh.createFromSubDControlNet === 'function') {
      let work = geo;
      try {
        if (geo && typeof geo.duplicate === 'function') {
          const d = geo.duplicate();
          if (d) work = d;
        }
      } catch (_) {}
      for (let sub = 0; sub < 4; sub++) {
        try {
          const m = rhino.Mesh.createFromSubDControlNet(work);
          if (m) {
            out.push(m);
            return out.length - before;
          }
        } catch (_) {}
        try {
          if (work && typeof work.subdivide === 'function') work.subdivide();
          else break;
        } catch (_) {
          break;
        }
      }
      return out.length - before;
    }
    if ((rhinoGeomMatches(geo, OT, 'Surface') || geo.objectType === 4) && rhino.Brep && typeof rhino.Brep.tryConvertBrep === 'function') {
      try {
        const brep = rhino.Brep.tryConvertBrep(geo);
        if (brep) pushRhinoMeshesFromGeometry(brep, rhino, OT, MT, out);
      } catch (_) {}
    }
    if (out.length === before && geo.hasBrepForm && rhino.Brep && typeof rhino.Brep.tryConvertBrep === 'function') {
      try {
        const brep = rhino.Brep.tryConvertBrep(geo);
        if (brep) pushRhinoMeshesFromGeometry(brep, rhino, OT, MT, out);
      } catch (_) {}
    }
    return out.length - before;
  }

  /** When Brep faces have no render meshes (common for lightweight 3DM saves), draw 3D edges as polylines. */
  function rhinoAddBrepWireframe(brep, matrix4, group) {
    if (!brep || typeof brep.edges !== 'function') return;
    try {
      const edges = brep.edges();
      const n = edges.count;
      for (let ei = 0; ei < n; ei++) {
        const edge = edges.get(ei);
        if (edge) rhinoAddCurveWireframe(edge, matrix4, group);
      }
    } catch (_) {}
  }

  function rhinoAddCurveWireframe(geo, matrix4, group) {
    if (!geo || typeof geo.pointAt !== 'function') return;
    const dom = geo.domain;
    if (!dom || dom.length < 2) return;
    const t0 = dom[0];
    const t1 = dom[1];
    const segs = 128;
    const pts = [];
    for (let j = 0; j <= segs; j++) {
      const t = t0 + (t1 - t0) * (j / segs);
      let p;
      try {
        p = geo.pointAt(t);
      } catch (_) {
        continue;
      }
      if (!p || p.length < 3) continue;
      const v = new THREE.Vector3(p[0], p[1], p[2]);
      if (matrix4) v.applyMatrix4(matrix4);
      pts.push(v);
    }
    if (pts.length < 2) return;
    const geom = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xd3d3d3 }));
    group.add(line);
  }

  /** Wireframe when Extrusion has no render mesh: bottom and top profile curves + path. */
  function rhinoAddExtrusionWireframe(ex, matrix4, group) {
    if (!ex || typeof ex.profile3d !== 'function') return;
    try {
      const addCurve = (c) => {
        if (c) rhinoAddCurveWireframe(c, matrix4, group);
      };
      addCurve(ex.profile3d(0, 0));
      addCurve(ex.profile3d(0, 1));
      if (typeof ex.pathLineCurve === 'function') addCurve(ex.pathLineCurve());
    } catch (_) {}
  }
