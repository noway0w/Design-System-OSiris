<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curintis 3D – CAD Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link href="../css/tailwind.css" rel="stylesheet"/>
  <link href="../css/variables.css" rel="stylesheet"/>
  <style>
    #curintis-canvas { display: block; width: 100%; height: 100%; }
    .curintis-overlay { pointer-events: none; }
    .curintis-overlay > * { pointer-events: auto; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-white min-h-screen flex flex-col">
  <div class="flex-shrink-0 flex items-center justify-between p-4 border-b border-slate-200 dark:border-white/10">
    <a href="../map-app.html" class="flex items-center gap-2 text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
      <span>Back to Map</span>
    </a>
    <h1 class="text-lg font-bold">Curintis 3D</h1>
    <div class="flex items-center gap-2">
      <label class="flex items-center gap-2 bg-card-light/60 dark:bg-card-dark/60 backdrop-blur-xl px-4 py-2 rounded-lg border border-white/30 dark:border-white/10 cursor-pointer hover:bg-card-light/80 dark:hover:bg-card-dark/80 transition-colors">
        <input type="file" id="import-igs-input" accept=".igs,.iges" class="hidden"/>
        <span class="material-symbols-outlined text-lg">upload_file</span>
        <span class="text-sm font-medium">Import IGES</span>
      </label>
      <label class="flex items-center gap-2 bg-card-light/60 dark:bg-card-dark/60 backdrop-blur-xl px-4 py-2 rounded-lg border border-white/30 dark:border-white/10 cursor-pointer hover:bg-card-light/80 dark:hover:bg-card-dark/80 transition-colors">
        <input type="checkbox" id="heat-sim-toggle" class="rounded accent-primary"/>
        <span class="text-sm font-medium">Run Heat Simulation</span>
      </label>
    </div>
  </div>
  <div class="flex-1 relative min-h-[60vh]">
    <canvas id="curintis-canvas"></canvas>
    <div id="curintis-loading" class="curintis-overlay absolute inset-0 flex items-center justify-center bg-background-light/80 dark:bg-background-dark/80">
      <div class="text-center">
        <div class="animate-pulse text-primary text-lg font-semibold mb-2 curintis-loading-text">Loading CAD model…</div>
        <div class="text-sm text-slate-500 dark:text-slate-400">Initializing viewer</div>
      </div>
    </div>
    <div id="curintis-error" class="curintis-overlay absolute inset-0 hidden items-center justify-center bg-background-light/90 dark:bg-background-dark/90">
      <div class="max-w-md p-6 bg-card-light dark:bg-card-dark rounded-lg border border-slate-200 dark:border-white/10 shadow-xl text-center">
        <span class="material-symbols-outlined text-4xl text-red-500 mb-4">error</span>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-2">CAD file not found</h2>
        <p class="text-slate-600 dark:text-slate-400 text-sm mb-4 curintis-error-msg">Place <code class="bg-slate-200 dark:bg-slate-700 px-1 rounded">gene-synthesizer.igs</code> in <code class="bg-slate-200 dark:bg-slate-700 px-1 rounded">curintis/assets/</code> or use <strong>Import IGES</strong> to load a file.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist/occt-import-js.js"></script>
  <script>
(function () {
  const canvas = document.getElementById('curintis-canvas');
  const loadingEl = document.getElementById('curintis-loading');
  const errorEl = document.getElementById('curintis-error');
  const heatToggle = document.getElementById('heat-sim-toggle');
  const importInput = document.getElementById('import-igs-input');

  let scene, camera, renderer, controls, cadMeshes = [];
  let cadGroup = null;
  let heatSimulationActive = false;
  let heatAnimationTime = 0;

  function showError(msg) {
    loadingEl.classList.add('hidden');
    errorEl.classList.remove('hidden');
    errorEl.classList.add('flex');
    const msgEl = errorEl.querySelector('.curintis-error-msg');
    if (msgEl && msg) msgEl.textContent = msg;
  }

  function showLoading(text) {
    loadingEl.classList.remove('hidden');
    loadingEl.classList.add('flex');
    errorEl.classList.add('hidden');
    const textEl = loadingEl.querySelector('.curintis-loading-text');
    if (textEl && text) textEl.textContent = text;
  }

  function hideLoading() {
    loadingEl.classList.add('hidden');
    loadingEl.classList.remove('flex');
    errorEl.classList.add('hidden');
    errorEl.classList.remove('flex');
  }

  function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101a22);
    if (document.documentElement.classList.contains('light')) {
      scene.background.setHex(0xf6f7f8);
    }

    camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
    camera.position.set(80, 60, 80);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const amb = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(50, 80, 50);
    dir.castShadow = true;
    scene.add(dir);
    const fill = new THREE.DirectionalLight(0x88ccff, 0.3);
    fill.position.set(-30, 20, -30);
    scene.add(fill);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = true;

    window.addEventListener('resize', () => {
      camera.aspect = canvas.clientWidth / canvas.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    });
  }

  function ensureTypedArray(arr, Ctor) {
    if (arr instanceof Ctor) return arr;
    return new Ctor(arr);
  }

  function occtMeshToThree(meshData) {
    const geom = new THREE.BufferGeometry();
    const posArr = ensureTypedArray(meshData.attributes.position.array, Float32Array);
    geom.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
    if (meshData.attributes.normal) {
      const normArr = ensureTypedArray(meshData.attributes.normal.array, Float32Array);
      geom.setAttribute('normal', new THREE.Float32BufferAttribute(normArr, 3));
    }
    if (meshData.index && meshData.index.array) {
      const idxArr = ensureTypedArray(meshData.index.array, Uint32Array);
      geom.setIndex(new THREE.BufferAttribute(idxArr, 1));
    }
    geom.computeVertexNormals();
    return geom;
  }

  function addHeatColors(geometry, t) {
    const pos = geometry.attributes.position;
    const count = pos.count;
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const y = pos.getY(i);
      const heat = 0.5 + 0.5 * Math.sin(y * 0.02 + t * 2);
      const r = heat;
      const g = heat * 0.3;
      const b = 1 - heat;
      colors[i * 3] = r;
      colors[i * 3 + 1] = g;
      colors[i * 3 + 2] = b;
    }
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.attributes.color.needsUpdate = true;
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    if (heatSimulationActive && cadMeshes.length > 0) {
      heatAnimationTime += 0.016;
      cadMeshes.forEach(({ geometry }) => addHeatColors(geometry, heatAnimationTime));
    }
    renderer.render(scene, camera);
  }

  function clearCad() {
    if (cadGroup) {
      scene.remove(cadGroup);
      cadMeshes.forEach(({ mesh, geometry }) => {
        geometry.dispose();
        if (mesh.material) mesh.material.dispose();
      });
      cadMeshes = [];
      cadGroup = null;
    }
  }

  function buildMeshesFromResult(result) {
    if (!result || !result.success || !result.meshes || result.meshes.length === 0) {
      throw new Error('Failed to parse IGES');
    }

    clearCad();

    cadGroup = new THREE.Group();
    for (const m of result.meshes) {
      const geom = occtMeshToThree(m);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x9ca3af,
        metalness: 0.3,
        roughness: 0.6,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      cadGroup.add(mesh);
      cadMeshes.push({ mesh, geometry: geom });
    }

    const box = new THREE.Box3().setFromObject(cadGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    cadGroup.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 60 / maxDim;
    cadGroup.scale.setScalar(scale);

    scene.add(cadGroup);

    if (heatSimulationActive) {
      cadMeshes.forEach(({ mesh, geometry }) => {
        if (mesh.material) {
          mesh.material.vertexColors = true;
          mesh.material.color.setHex(0xffffff);
        }
      });
    }

    hideLoading();
  }

  const OCTT_CDN = 'https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist';

  function parseIgesInWorker(buffer) {
    const workerScript = `
      importScripts('${OCTT_CDN}/occt-import-js.js');
      onmessage = async function (ev) {
        try {
          const modulOverrides = {
            locateFile: function (path) { return '${OCTT_CDN}/' + path; }
          };
          const occt = await occtimportjs(modulOverrides);
          const uint8 = new Uint8Array(ev.data.buffer);
          const result = occt.ReadFile(ev.data.format, uint8, ev.data.params);
          postMessage({ ok: true, result });
        } catch (e) {
          postMessage({ ok: false, error: e.message || String(e) });
        }
      };
    `;
    const blob = new Blob([workerScript], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);
    return new Promise((resolve, reject) => {
      const worker = new Worker(workerUrl);
      worker.onmessage = (ev) => {
        URL.revokeObjectURL(workerUrl);
        worker.terminate();
        const msg = ev.data;
        if (msg.ok) {
          resolve(msg.result);
        } else {
          reject(new Error(msg.error || 'Worker parsing failed'));
        }
      };
      worker.onerror = (err) => {
        URL.revokeObjectURL(workerUrl);
        worker.terminate();
        reject(new Error(err.message || 'Worker failed'));
      };
      worker.postMessage({ format: 'iges', buffer, params: null }, [buffer]);
    });
  }

  async function processCadData(buffer) {
    const result = await parseIgesInWorker(buffer);
    buildMeshesFromResult(result);
  }

  async function loadCad() {
    try {
      showLoading('Loading CAD model…');
      const res = await fetch('assets/gene-synthesizer.igs');
      if (!res.ok) throw new Error('File not found');
      const buffer = await res.arrayBuffer();
      await processCadData(buffer);
    } catch (e) {
      console.error('Curintis load error:', e);
      showError();
    }
  }

  if (importInput) {
    importInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
        showLoading(file.size > 5 * 1024 * 1024
          ? `Importing IGES (${sizeMB} MB)… Parsing may take 1–2 minutes.`
          : 'Importing IGES…');
        const buffer = await file.arrayBuffer();
        await processCadData(buffer);
      } catch (err) {
        console.error('Import IGES error:', err);
        showError(err?.message || 'Failed to import IGES file');
      }
      importInput.value = '';
    });
  }

  heatToggle.addEventListener('change', () => {
    heatSimulationActive = heatToggle.checked;
    cadMeshes.forEach(({ mesh, geometry }) => {
      if (mesh.material) {
        mesh.material.vertexColors = heatSimulationActive;
        mesh.material.color.setHex(0xffffff);
      }
      if (!heatSimulationActive && geometry.attributes.color) {
        geometry.deleteAttribute('color');
      }
    });
  });

  initThree();
  loadCad();
  animate();
})();
  </script>
</body>
</html>
