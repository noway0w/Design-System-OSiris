<!DOCTYPE html>
<html lang="en" translate="no" class="light dash-page" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dashboard — OSiris</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link href="/css/tailwind.css" rel="stylesheet"/>
  <link href="/css/variables.css" rel="stylesheet"/>
  <link href="/css/dashboard-shell.css?v=20260518q" rel="stylesheet"/>
  <link href="/css/dashboard-modal.css" rel="stylesheet"/>
</head>
<body class="font-sans antialiased">
  
  <div class="dash-root">
    <div class="dash-blob-tl" aria-hidden="true"></div>
    
    
    <div class="dash-blob-br" aria-hidden="true"></div>

    <p class="dash-mobile-brand">OSiris</p>

    <nav class="dash-nav glass-panel" aria-label="Main">
      <div>
        <h1 class="dash-brand-title">OSiris</h1>
        <p class="dash-brand-sub">Platform</p>
      </div>
      <div class="dash-nav-links" id="dash-dynamic-nav"></div>
      <div class="dash-nav-footer">
        <button type="button" class="dash-nav-btn" id="btn-logout" title="Sign out">
          <span class="material-symbols-outlined" aria-hidden="true">logout</span>
          <span>Sign out</span>
        </button>
      </div>
    </nav>

    <main class="dash-main">
      <div id="platform-topbar-mount" data-mode="hydrate"></div>
      <div id="dash-mobile-tabs" class="dash-mobile-tabs" aria-label="Dashboard sections" hidden></div>

      <div class="dash-content">
        <section data-dash-panel="home" id="panel-home">
          <div class="dash-section-head" id="services">
            <div>
              <h3 class="dash-section-title">App services</h3>
              <p class="dash-section-desc">Open the applications assigned to your account.</p>
            </div>
          </div>
          <p id="services-empty" class="dash-empty hidden mt-6">No app services assigned to your account yet.</p>
          <div id="services-grid" class="dash-app-services-grid"></div>
        </section>

        <section data-dash-panel="super_admin" id="panel-super-admin" class="hidden"></section>
        <section data-dash-panel="team" id="panel-team" class="hidden"></section>
        <section data-dash-panel="projects" id="panel-projects" class="hidden"></section>
        <section data-dash-panel="files" id="panel-files" class="hidden"></section>
      </div>
    </main>
  </div>

  <script src="/js/platform-shell-topbar.js"></script>
  <script src="/dashboard/dashboard-admin.js?v=20260525"></script>
  <script>
(function () {
  const grid = document.getElementById('services-grid');
  const empty = document.getElementById('services-empty');
  /** Served from /assets/Dashboard_assets (copied from dashboard/illustrations). */
  var DASHBOARD_ASSETS = "/assets/Dashboard_assets";
  var ILLUS_V = "20260518n";
  /** Foreground icon + watermark use the same slug file */
  var SERVICE_TILE_SVGS = {
    "map-app": DASHBOARD_ASSETS + "/map-app.svg?v=" + ILLUS_V,
    iris: DASHBOARD_ASSETS + "/iris.svg?v=" + ILLUS_V,
    carscan: DASHBOARD_ASSETS + "/carscan.svg?v=" + ILLUS_V,
    "3Dobjscan": DASHBOARD_ASSETS + "/3dobjscan.svg?v=" + ILLUS_V,
    disable: DASHBOARD_ASSETS + "/disable.svg?v=" + ILLUS_V,
  };

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function svcTileArt(s) {
    return SERVICE_TILE_SVGS[s.service_name] || SERVICE_TILE_SVGS.iris;
  }

  function serviceIllustration(s) {
    var src = svcTileArt(s);
    return (
      '<div class="dash-app-service-illus" aria-hidden="true">' +
      '<img src="' + escapeHtml(src) + '" alt="" class="dash-app-service-illus__img" width="48" height="48" loading="lazy"/>' +
      "</div>"
    );
  }

  function card(s) {
    var allowed = s.allowed === true || s.allowed === 1;
    /* Back-compat if older API omitted flag: assume allowed when unknown */
    if (s.allowed === undefined || s.allowed === null) {
      allowed = true;
    }
    var src = svcTileArt(s);
    var wrap = allowed ? document.createElement('a') : document.createElement('div');
    if (allowed) {
      wrap.href = s.url;
    } else {
      wrap.setAttribute('role', 'article');
      wrap.setAttribute(
        'aria-label',
        (s.title || s.service_name) + ': not available — you do not have access to this app.'
      );
    }
    wrap.className =
      'dash-app-service-tile glass-panel' + (!allowed ? ' dash-app-service-tile--denied' : '');
    wrap.innerHTML =
      '<div class="dash-app-service-tile-bg" aria-hidden="true">' +
      '<img src="' + escapeHtml(src) + '" alt="" class="dash-app-service-tile-bg__img" loading="lazy"/>' +
      '</div>' +
      '<div class="dash-app-service-tile-top">' +
      serviceIllustration(s) +
      '<span class="dash-app-service-menu" aria-hidden="true">' +
      '<span class="material-symbols-outlined">more_horiz</span></span>' +
      '</div>' +
      '<div>' +
      '<h3 class="dash-app-service-tile__title">' + escapeHtml(s.title) + '</h3>' +
      '<p class="dash-app-service-tile__subtitle">' + escapeHtml(s.subtitle || '') + '</p>' +
      '</div>' +
      '<div class="dash-app-service-tile-footer">' +
      (allowed
        ? '<span class="dash-app-service-status">Active</span>'
        : '<span class="dash-app-service-status dash-app-service-status--denied">No access</span>') +
      '</div>';
    return wrap;
  }

  function renderServices(list) {
    grid.innerHTML = '';
    if (!list.length) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');
    list.forEach(function (s) { grid.appendChild(card(s)); });
  }

  async function load() {
    var data = null;
    try {
      data = await window.OSirisPlatformReady;
    } catch (e) {
      return;
    }
    if (!data || !data.user || data.error) {
      return;
    }
    renderServices(data.services || []);
    if (window.OSirisDashboardAdmin) {
      window.OSirisDashboardAdmin.init(data);
    }
  }

  document.getElementById('btn-logout').addEventListener('click', async function () {
    await fetch('/api/auth-logout.php', { method: 'POST', credentials: 'same-origin' }).catch(function () {});
    window.location.href = '/login/';
  });

  load();
})();
  </script>
</body>
</html>
