# Add inside the server { } for app (HTTP/HTTPS) that serves public_html.
# CarScan backend: uvicorn 127.0.0.1:9001 (see speedvision-carscan.service)
#
# After editing: sudo nginx -t && sudo systemctl reload nginx

# WebSocket: must be more specific than /api/carscan/ — place this block first.
location /api/carscan/ws {
    proxy_pass http://127.0.0.1:9001/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 8m;
}

# REST: /api/carscan/health -> 127.0.0.1:9001/health
location /api/carscan/ {
    proxy_pass http://127.0.0.1:9001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 8m;
}

# Block direct access to heavy / sensitive files under /carscan/ (clone lives here)
location ~* ^/carscan/.*\.(py|pth|pt|pkl|onnx|sh|log)$ {
    deny all;
    return 404;
}

location ~* ^/carscan/\.git {
    deny all;
    return 404;
}
